            mode: greedy
          group_field: label
          group_mapping:
            recovered_token_dense: recovered_token_dense
            baseline_sare: baseline_sare
            improved_lss_sare: kl_lss_sare
          value_field: eval_success_rate
          seed_field: seed
          default_lane: original
    retry_block_metrics:
      sources:
        - kind: grouped_csv
          path: outputs/reports/lss_robustness_multiseed_report.csv
          filters:
            mode: greedy
          group_field: label
          group_mapping:
