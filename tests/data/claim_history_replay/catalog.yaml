name: doorkey_claim_history_replay_catalog
schema_version: 1
cases:
  - id: checkpoint_dynamics
    family: PPO tuning / checkpoint dynamics
    ledger_family: PPO tuning / checkpoint dynamics
    phase_status: negative
    description: Archived PPO checkpoint scan for DoorKey SARE greedy recovery.
    expected_verdict: "FAIL: claim remains frozen"
    rationale: PPO-only routed win language is now explicitly disallowed, and the archived checkpoint scan also misses the current external-64 fairness prerequisites.
    requested_claims:
      - ppo_only_routed_win
    evaluation:
      path_key: checkpoint_dynamics_scan
      episodes: 32
    controls_present:
      - baseline_sare
    source_reports:
      - outputs/reports/checkpoint_dynamics_report.md
      - outputs/reports/checkpoint_dynamics_report.csv
    provenance_note: The historical phase was a PPO-only checkpoint scan, not a teacher-guided KL learner-state comparison.
    combined_metrics:
      sources:
        - kind: grouped_csv
          path: outputs/reports/checkpoint_dynamics_report.csv
          filters:
            mode: greedy
            variant: sare
          group_field: variant
          group_mapping:
            sare: baseline_sare
          value_field: eval_success_rate
    retry_block_metrics:
      sources: []

  - id: entropy_schedule
    family: Entropy schedules
    ledger_family: Entropy schedules
    phase_status: negative
    description: PPO entropy-schedule sweep for DoorKey SARE greedy recovery.
    expected_verdict: "FAIL: claim remains frozen"
    rationale: PPO-only routed win language is disallowed, and the entropy sweep also predates the canonical external-64 thaw prerequisites.
    requested_claims:
      - ppo_only_routed_win
    evaluation:
      path_key: entropy_schedule_sweep
      episodes: 32
    controls_present:
      - baseline_sare
    source_reports:
      - outputs/reports/entropy_schedule_report.md
      - outputs/reports/entropy_schedule_report.csv
    provenance_note: This is a PPO-only schedule sweep rather than a teacher-guided structured comparison.
    combined_metrics:
      sources:
        - kind: grouped_csv
          path: outputs/reports/entropy_schedule_report.csv
          filters:
            mode: greedy
            variant: sare
          group_field: variant
          group_mapping:
            sare: baseline_sare
          value_field: eval_success_rate
    retry_block_metrics:
      sources: []

  - id: self_imitation
    family: Self-imitation
    ledger_family: Self-imitation
    phase_status: negative
    description: Post-hoc self-imitation fine-tuning for DoorKey routed students.
    expected_verdict: "INCONCLUSIVE: missing prerequisites"
    rationale: The historical self-imitation phase did not package the required external-64 structured controls or retry-block slice under the modern gate.
    requested_claims:
      - historical_recovery_probe
    evaluation:
      path_key: self_imitation_finetune
      episodes: 64
    controls_present:
      - baseline_sare
    source_reports:
      - outputs/reports/self_imitation_report.md
      - outputs/reports/self_imitation_report.csv
    provenance_note: The report summarizes before/after greedy and sampled behavior, not a canonical external-64 structured comparison pack.
    combined_metrics:
      sources:
        - kind: grouped_csv
          path: outputs/reports/self_imitation_report.csv
          group_field: variant
          group_mapping:
            sare: baseline_sare
            single_expert: single_expert
          value_field: after_greedy_success
    retry_block_metrics:
      sources: []

  - id: policy_distillation
    family: Offline teacher distillation
    ledger_family: Offline teacher distillation
    phase_status: negative
    description: Offline teacher distillation from flat_dense or token_dense into SARE and token_dense students.
    expected_verdict: "INCONCLUSIVE: missing prerequisites"
    rationale: The phase is teacher-guided but not the current KL learner-state family and does not supply the modern matched-control/retry-block comparison pack.
    requested_claims:
      - bounded_teacher_guided_doorkey_sare
    evaluation:
      path_key: offline_policy_distillation
      episodes: 64
    controls_present: []
    source_reports:
      - outputs/reports/policy_distillation_report.md
      - outputs/reports/policy_distillation_report.csv
    provenance_note: Historical distillation results are preserved as source evidence, but they are not directly comparable to the frozen KL learner-state benchmark slice.
    combined_metrics:
      sources:
        - kind: grouped_csv
          path: outputs/reports/policy_distillation_report.csv
          filters:
            student_variant: sare
          group_field: student_variant
          group_mapping:
            sare: distilled_sare
          value_field: after_greedy_success
        - kind: grouped_csv
          path: outputs/reports/policy_distillation_report.csv
          filters:
            student_variant: token_dense
          group_field: student_variant
          group_mapping:
            token_dense: distilled_token_dense
          value_field: after_greedy_success
    retry_block_metrics:
      sources: []

  - id: learner_state_supervision_initial
    family: Learner-state supervision
    ledger_family: Learner-state supervision
    phase_status: bounded positive
    description: Initial single-run learner-state supervision signal before multi-seed hardening.
    expected_verdict: "INCONCLUSIVE: missing prerequisites"
    rationale: The initial positive learner-state signal does not include the required matched controls, retry block, or combined DoorKey slice under the modern frozen gate.
    requested_claims:
      - bounded_teacher_guided_doorkey_sare
    evaluation:
      path_key: learner_state_round_summary
      episodes: 64
    controls_present:
      - kl_lss_sare
    source_reports:
      - outputs/reports/learner_state_supervision_report.md
      - outputs/reports/learner_state_supervision_report.csv
    provenance_note: This pack captures the first bounded positive learner-state signal, not a modern thaw-ready comparison pack.
    combined_metrics:
      sources:
        - kind: grouped_csv
          path: outputs/reports/learner_state_supervision_report.csv
          group_field: name
          group_mapping:
            flat_dense_to_sare_lss: kl_lss_sare
            flat_dense_to_token_dense_lss: kl_lss_token_dense
          value_field: final_greedy_success
    retry_block_metrics:
      sources: []

  - id: teacher_extraction_multiseed
    family: Learner-state supervision
    ledger_family: Learner-state supervision
    phase_status: bounded positive
    description: First multi-seed teacher-guided learner-state DoorKey signal before hardening.
    expected_verdict: "INCONCLUSIVE: missing prerequisites"
    rationale: The reopened positive signal lacked the modern token_dense KL control, single_expert control, and canonical retry block.
    requested_claims:
      - bounded_teacher_guided_doorkey_sare
    evaluation:
      path_key: external_policy_diagnostics
      episodes: 64
    controls_present:
      - recovered_token_dense
      - baseline_sare
      - kl_lss_sare
    source_reports:
      - outputs/reports/teacher_extraction_multiseed_report.md
      - outputs/reports/teacher_extraction_multiseed_report.csv
    provenance_note: The original 3-seed reopened result predated the later matched-control and final-block fairness requirements.
    combined_metrics:
      sources:
        - kind: grouped_csv
          path: outputs/reports/teacher_extraction_multiseed_report.csv
          filters:
            mode: greedy
          group_field: run_name
          group_mapping:
            token_dense_ent1e3: recovered_token_dense
            flat_dense_to_sare_lss: kl_lss_sare
          value_field: eval_success_rate
      manual_metrics:
        baseline_sare:
          mean: 0.0000
          min: 0.0000
          max: 0.0000
          complete_seed_failures: 3
          seed_count: 3
      actual_sets_override:
        - [original, 7]
        - [original, 11]
        - [original, 19]
    retry_block_metrics:
      manual_metrics:
        baseline_sare:
          mean: 0.0000
          min: 0.0000
          max: 0.0000
          complete_seed_failures: 3
          seed_count: 3
        kl_lss_sare:
          mean: 0.5000
          min: 0.0000
          max: 1.0000
          complete_seed_failures: 1
          seed_count: 3
        recovered_token_dense:
          mean: 0.5677
          min: 0.0000
          max: 1.0000
          complete_seed_failures: 1
          seed_count: 3
      actual_sets_override:
        - [original, 7]
        - [original, 11]
        - [original, 19]

  - id: lss_robustness_multiseed
