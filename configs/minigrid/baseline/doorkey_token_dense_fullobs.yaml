seed: 7
tags: ["minigrid", "baseline", "doorkey", "token_dense", "fullobs"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 4
  checkpoint_interval: 16
env:
  suite: minigrid
  env_id: MiniGrid-DoorKey-5x5-v0
  num_envs: 8
  num_eval_envs: 8
  fully_observed: true
ppo:
  rollout_steps: 64
  total_updates: 48
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.00025
model:
  variant: token_dense
  hidden_size: 128
  token_dim: 128
  encoder_layers: 2
  num_heads: 4
logging:
  run_name: baseline_doorkey_token_dense_fullobs
  output_dir: outputs/minigrid/baseline/doorkey_token_dense_fullobs
evaluation:
  episodes: 16
  greedy: true
