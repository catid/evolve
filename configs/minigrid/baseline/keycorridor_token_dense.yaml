seed: 7
tags: ["minigrid", "baseline", "keycorridor", "token_dense"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 4
  checkpoint_interval: 16
env:
  suite: minigrid
  env_id: MiniGrid-KeyCorridorS3R1-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 64
  total_updates: 48
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.00025
model:
  variant: token_dense
  hidden_size: 128
  token_dim: 128
  encoder_layers: 2
  num_heads: 4
logging:
  run_name: baseline_keycorridor_token_dense
  output_dir: outputs/minigrid/baseline/keycorridor_token_dense
evaluation:
  episodes: 16
  greedy: true
