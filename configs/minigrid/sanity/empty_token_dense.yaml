seed: 7
tags: ["minigrid", "sanity", "empty", "token_dense"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 2
  checkpoint_interval: 8
env:
  suite: minigrid
  env_id: MiniGrid-Empty-5x5-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 64
  total_updates: 32
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.00025
model:
  variant: token_dense
  hidden_size: 128
  token_dim: 128
  encoder_layers: 2
  num_heads: 4
logging:
  run_name: sanity_empty_token_dense
  output_dir: outputs/minigrid/sanity/empty_token_dense
evaluation:
  episodes: 16
  greedy: true
