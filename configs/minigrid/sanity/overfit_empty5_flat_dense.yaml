seed: 7
tags: ["minigrid", "sanity", "overfit", "empty5", "flat_dense"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 10
  checkpoint_interval: 25
env:
  suite: minigrid
  env_id: MiniGrid-Empty-5x5-v0
  num_envs: 1
  num_eval_envs: 1
  max_episode_steps: 32
  fully_observed: true
ppo:
  rollout_steps: 32
  total_updates: 400
  update_epochs: 8
  minibatches: 1
  learning_rate: 0.0001
  anneal_lr: false
  clip_coef: 0.1
  value_clip_coef: 0.1
  ent_coef: 0.0
model:
  variant: flat_dense
  hidden_size: 128
logging:
  run_name: minigrid_overfit_empty5_flat_dense
  output_dir: outputs/minigrid/overfit/empty5_flat_dense
evaluation:
  episodes: 8
  greedy: true
