seed: 7
tags: ["minigrid", "main", "memory", "token_gru"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 5
  checkpoint_interval: 20
env:
  suite: minigrid
  env_id: MiniGrid-MemoryS9-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 64
  total_updates: 120
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.0003
model:
  variant: token_gru
  hidden_size: 128
  token_dim: 128
  encoder_layers: 2
  num_heads: 4
logging:
  run_name: minigrid_main_memory_token_gru
  output_dir: outputs/minigrid/main/memory_token_gru
evaluation:
  episodes: 16
  greedy: true
