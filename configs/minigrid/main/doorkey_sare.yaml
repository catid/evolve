seed: 7
tags: ["minigrid", "main", "doorkey", "sare"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 4
  checkpoint_interval: 16
env:
  suite: minigrid
  env_id: MiniGrid-DoorKey-5x5-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 64
  total_updates: 48
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.00025
model:
  variant: sare
  hidden_size: 128
  token_dim: 128
  expert_count: 4
  top_k: 2
  expert_hidden_size: 256
  temperature: 1.0
logging:
  run_name: main_doorkey_sare
  output_dir: outputs/minigrid/main/doorkey_sare
evaluation:
  episodes: 16
  greedy: true
