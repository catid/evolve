schema_version: 1

claim:
  id: doorkey_round6_current_claim
  status: current_active_benchmark
  task: DoorKey
  allowed_claim_key: bounded_teacher_guided_doorkey_sare
  allowed_claim_text: bounded teacher-guided DoorKey SARE result
  disallowed_claim_keys:
    - ppo_only_routed_win
    - specifically_multi_expert_routed_advantage
    - cross_task_routed_advantage
    - keycorridor_transfer_claim

canonical_method:
  teacher: flat_dense
  supervision: teacher_logit_kl
  learner_state_collection: append_all
  student: sare

evaluation:
  path_key: external_policy_diagnostics
  path_text: external 64-episode policy_diagnostics path
  episodes: 64
  task: DoorKey

seed_groups:
  original:
    lane: original
    seeds: [7, 11, 19]
  structured_slice:
    lanes: [original, fresh, fresh_extra]
    seeds: [7, 11, 19, 23, 29, 31, 37, 41, 43]
  retry_block:
    lane: fresh_final
    seeds: [47, 53, 59]
  combined:
    blocks:
      - lane: original
        seeds: [7, 11, 19]
      - lane: fresh
        seeds: [23, 29, 31]
      - lane: fresh_extra
        seeds: [37, 41, 43]
      - lane: fresh_final
        seeds: [47, 53, 59]

variants:
  recovered_token_dense:
    display: recovered token_dense
    family: baseline
  kl_lss_token_dense:
    display: KL learner-state token_dense
    family: teacher_guided_structured_control
  kl_lss_single_expert:
    display: KL learner-state single_expert
    family: teacher_guided_structured_control
  baseline_sare:
    display: baseline PPO SARE
    family: baseline
  kl_lss_sare:
    display: KL learner-state SARE
    family: teacher_guided_routed

authoritative_reports:
  state_reconciliation: outputs/reports/next_round_state_reconciliation.md
  baseline_sync: outputs/reports/next_round_baseline_sync.md
  claim_ledger_snapshot: outputs/reports/claim_ledger_round6_current.md
  next_mega_decision_memo: outputs/reports/next_mega_portfolio_decision_memo.md
  next_mega_gate_report: outputs/reports/next_mega_portfolio_gate_report.md
  next_mega_stage1_fruitful: outputs/reports/next_mega_portfolio_stage1_screening_fruitful.md
  next_mega_stage1_exploratory: outputs/reports/next_mega_portfolio_stage1_screening_exploratory.md
  next_mega_holdout: outputs/reports/next_mega_portfolio_stage4_holdout.md
  next_mega_antiregression: outputs/reports/next_mega_portfolio_stage5_antiregression.md
  next_mega_route_validation: outputs/reports/next_mega_portfolio_stage6_route_validation.md
  next_mega_stability: outputs/reports/next_mega_portfolio_stage7_stability.md

thresholds:
  combined_means:
    recovered_token_dense: 0.5586
    kl_lss_token_dense: 0.6354
    kl_lss_single_expert: 0.6862
    baseline_sare: 0.0000
    kl_lss_sare: 0.7122
  combined_complete_seed_failures:
    recovered_token_dense: 5
    kl_lss_token_dense: 4
    kl_lss_single_expert: 1
    baseline_sare: 12
    kl_lss_sare: 1
  retry_block_means:
    recovered_token_dense: 1.0000
    kl_lss_token_dense: 1.0000
    kl_lss_single_expert: 0.4635
    baseline_sare: 0.0000
    kl_lss_sare: 0.3125
  retry_block_complete_seed_failures:
    recovered_token_dense: 0
    kl_lss_token_dense: 0
    kl_lss_single_expert: 0
