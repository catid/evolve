    kl_lss_sare: 1
  keycorridor_transfer_means:
    recovered_token_dense: 0.0000
    baseline_sare: 0.0000
    kl_lss_sare: 0.0000
  keycorridor_transfer_status: no_claim_transfer

thaw_gate:
  required_controls:
    - recovered_token_dense
    - kl_lss_token_dense
    - kl_lss_single_expert
    - baseline_sare
  required_evaluation:
    path_key: external_policy_diagnostics
    episodes: 64
    task: DoorKey
  retry_block:
    lane: fresh_final
    seeds: [47, 53, 59]
    candidate_sare_mean_must_exceed: 0.3125
    candidate_sare_must_match_or_beat_same_block_single_expert: true
    candidate_sare_complete_seed_failures_must_be_lte: 1
  combined_picture:
    candidate_sare_mean_must_be_gte: 0.7122
    candidate_sare_complete_seed_failures_must_be_lte: 1
  disallowed_claim_keys:
    - ppo_only_routed_win
    - specifically_multi_expert_routed_advantage
    - cross_task_routed_advantage
    - keycorridor_transfer_claim
  current_expected_gate_status: "PASS: thaw consideration allowed"

benchmark_pack:
  schema_version: 1
  required_artifact_keys:
    - state_reconciliation
    - baseline_sync
    - claim_ledger_snapshot
    - next_mega_decision_memo
