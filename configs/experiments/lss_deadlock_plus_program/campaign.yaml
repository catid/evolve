analysis:
  program_label: Deadlock-Plus Program
  current_gate_report: outputs/reports/deadlock_arch_gate_report.md
  current_gate_report_json: outputs/reports/deadlock_arch_gate_report.json
  source_stage1_root: outputs/experiments/lss_deadlock_plus_program/stageB1_screening
  source_stage1_exploit_json: outputs/reports/deadlock_plus_stageB1_screening_exploit.json
  source_stage1_explore_json: outputs/reports/deadlock_plus_stageB1_screening_explore.json
  source_stage1_archpilot_json: outputs/reports/deadlock_plus_stageB1_screening_archpilot.json
  parity_candidate: round7
  shortlist_max_directions: 8
  transition_state_targets:
    - carry_key
    - at_locked_door
    - post_unlock
  family_definition_notes:
    - 'The development family now spans three explicit roles: `prospective_c` is the canonical teacher-locked loop, `prospective_d` is the transition-fragile contrast lane with full prior screening coverage, and `prospective_f` is the aligned routed success guardrail a fix must preserve.'
    - 'The holdout family now spans three complementary checks: `prospective_g` is the shared teacher-locked holdout, `prospective_h` is the bounded weakness/control-advantaged subgroup, and `prospective_i` is the ambiguous or unstable subgroup.'
    - 'The family is therefore broader than one memorable seed: it mixes repeated pre-key deadlocks, transition-fragile contrasts, and routed success guardrails so a fix can be separated from a generic weakening of the policy.'
    - 'The transition-state target remains explicit: a real fix should increase `carry_key`, `at_locked_door`, and `post_unlock` coverage rather than only reshaping pre-key search loops.'
  teacher_audit_cases:
    - lane: prospective_c
      seed: 193
    - lane: prospective_f
      seed: 241
    - lane: prospective_g
      seed: 251
    - lane: prospective_h
      seed: 269
    - lane: prospective_i
      seed: 283
  teacher_audit_offsets: [999, 1999]
  distribution_probe_candidates:
    - round6
    - round7
    - round10
    - round11
    - round10_phase_balanced_4096
    - round10_cap_balanced_4096
    - round10_door3_post5
    - select_round10_final
  distribution_probe_cases:
    - [prospective_c, 193]
    - [prospective_g, 251]
    - [prospective_h, 269]
    - [prospective_i, 283]
  shortlist:
    - label: teacher_smoothing_only
      track: exploit
      candidates:
        - round10_search_x4_temp105
        - round10_search_x4_temp110
        - round10_search_x6_temp105
        - round10_conf_search_x4_temp105
        - round10_conf_search_x4_temp110
        - round10_conf_search_x6_temp105
      hypothesis: true teacher smoothing above 1.0 remains the cleanest direct attack on the teacher_locked_no_escape subgroup and should be tested at larger scale before abandoning it.
      failure: the canonical pre-key deadlock stays locked and the family only re-enters the old tie bucket.
    - label: teacher_confidence_clipping
      track: exploit
      candidates:
        - round10_conf_search_x2
        - round10_conf_search_x4
        - round10_conf_search_x4_atkey_x2
        - round10_conf_search_x6
        - round10_conf_temp095_search_x4
        - round7_conf_search_x4
      hypothesis: confidence-weighted student targets may soften overconfident teacher lock on the deadlock subgroup without broadly weakening aligned routed cases.
      failure: the teacher-locked sentinel remains unchanged or the confidence-weighted lines add new complete-seed failures.
    - label: prekey_phase_local_weighting
      track: exploit
      candidates:
        - round7_search_x4
        - round10_search_x2
        - round10_search_x4
        - round10_search_x6
        - round10_search_x4_atkey_x2
        - round10_search_x4_temp095
        - round7
        - round10
        - round11
        - round12
      hypothesis: a larger calibrated bracket of pre-key schedules may still separate the route-fragile and ambiguous subgroups even if it does not solve the canonical teacher lock on its own.
      failure: the whole bracket recreates the same deadlock-dev tie bucket and leaves the teacher-locked sentinel unresolved.
    - label: transition_state_rebalance
      track: exploit
      candidates:
        - round10_prekey_phase_balanced_4096
        - round10_prekey_phase_balanced_4096_temp105
        - round10_prekey_phase_balanced_4096_conf
        - round10_prekey_phase_balanced_4096_conf_temp105
        - round10_prekey_phase_balanced_6144
        - round10_prekey_cap_balanced_4096
        - round10_transition_phase_balanced_4096
        - round10_transition_phase_balanced_4096_temp105
        - round10_transition_phase_balanced_4096_conf
      hypothesis: if the learner-state bottleneck is truly missing transition coverage, a larger rebalance bracket should outperform the older pre-key-only and replay/cap variants.
      failure: phase mix and entropy move while `carry_key` and `at_locked_door` coverage stay too low to change the deadlock family.
    - label: hybrid_teacher_transition
      track: exploit
      candidates:
        - round10_search_x6_transition_temp105
        - round10_conf_search_x4_transition_temp105
        - round10_post_unlock_x4_dis025
        - round10_post_unlock_x5
        - round10_post_unlock_x5_dis025
        - round10_temp095_post5
        - round12_post_unlock_x4_dis025
        - round12_post_unlock_x5
        - round12_post_unlock_x5_dis025
        - round7_post_unlock_x5
        - post_unlock_weighted
      hypothesis: the barrier may need joint target-shaping and schedule pressure, especially on the bounded weakness subgroup and on ambiguous transition-fragile cases.
      failure: the hybrid bracket only improves already-easy late cleanup cases while the pre-key deadlock family stays unchanged.
    - label: deadlock_selection_schedules
      track: exploit
      candidates:
        - round10_temp_095
        - round7_temp_095
        - select_round10_final
        - select_round10_mix025
        - select_round10_temp095
        - select_round7_final
        - select_round7_post5
        - select_round7_temp095
      hypothesis: a larger deadlock-aware selection bracket may be enough if the current barrier is partly checkpoint or schedule choice rather than raw model capacity.
      failure: the selection bracket only reshuffles tied lines below round6 and never creates a robust deadlock-family edge.
    - label: recursive_contract_bracket
      track: explore
      candidates:
        - round10_warm1_last_step
        - round10_warm2_last_step
        - round10_stoch25_last_two
        - round10_stoch50_last_two
        - round10_stoch75_last_two
        - settling_round10_last_step
        - settling_round10_last_two
        - round10_warm1_last_two
        - round10_warm2_last_two
        - round10_rounds12_last_step
        - round12_stoch50_last_two
        - round12_warm1_last_step
        - round12_warm2_last_step
        - settling_round7_last_step
      hypothesis: if the remaining ceiling is partly a recursive training-contract problem, a bigger but still bounded credit-horizon bracket should surface it without opening a new benchmark family.
      failure: the bracket either re-enters the old tie bucket or adds instability without breaking the teacher-locked or ambiguous subgroups.
    - label: phase_memory_pilot
      track: archpilot
      candidates:
        - round10_phase_memory_mix025_search_x4
        - round10_phase_memory_mix050_search_x4
        - round10_phase_memory_mix050_temp105_search_x4
        - round10_phase_memory_mix050_conf_search_x4
        - round10_phase_memory_mix075_search_x4
        - round10_phase_memory_mix075_temp105_search_x4
        - round10_phase_memory_mix050_search_x6
        - round10_phase_memory_mix025_conf_search_x4
      hypothesis: a slightly broader fast/slow routed state split may retain phase context across the pre-key transition without earning promotion into the public benchmark lane.
      failure: the pilot cannot do better than the old tie bucket or it weakens route structure enough to make a follow-on branch unjustified.

