schema_version: 1
name: lss_successor_validation
frozen_pack: outputs/reports/frozen_benchmark_pack.json
current_canonical_pack: outputs/reports/hard_family_saturation_successor_pack.json
current_canonical_name: round6
incumbent_candidate_name: post_unlock_weighted
base_candidate_template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml

evaluation:
  episodes: 64
  task: DoorKey
  path_key: external_policy_diagnostics

base_configs:
  flat_dense: configs/experiments/minigrid_doorkey_flat_dense_ent1e3.yaml
  token_dense: configs/experiments/minigrid_doorkey_token_dense_ent1e3.yaml
  single_expert: configs/experiments/minigrid_doorkey_single_expert_ent1e3.yaml
  sare: configs/experiments/minigrid_doorkey_sare_ent1e3.yaml

students:
  sare:
    config_name: sare_ent1e3.yaml
    run_name: sare_ent1e3
    output_label: kl_lss_sare
  token_dense:
    config_name: token_dense_ent1e3.yaml
    run_name: token_dense_ent1e3
    output_label: kl_lss_token_dense
  single_expert:
    config_name: single_expert_ent1e3.yaml
    run_name: single_expert_ent1e3
    output_label: kl_lss_single_expert

fresh_blocks:
  blocks:
    - lane: prospective_a
      seeds: [151, 157, 163]
    - lane: prospective_b
      seeds: [167, 173, 179]

selection:
  round7_min_gain: 0.05
  route_drop_min: 0.50
  route_randomization_drop_min: 0.25

stage_roots:
  stage0_blocks: outputs/experiments/lss_successor_validation/stage0_blocks
  stage1_screening: outputs/experiments/lss_successor_validation/stage1_screening
  stage2_fairness: outputs/experiments/lss_successor_validation/stage2_fairness
  stage3_route: outputs/experiments/lss_successor_validation/stage3_route

candidates:
  post_unlock_weighted:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    description: canonical thaw-qualified predecessor line
  round5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    description: one-extra-round successor ablation
    overrides:
      loop:
        rounds: 5
  round6:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    description: canonization-qualified successor line
    overrides:
      loop:
        rounds: 6
  round7:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    description: exploratory extra-round successor line
    overrides:
      loop:
        rounds: 7

fairness_candidates:
  - round6
  - round7

reports:
  registration: outputs/reports/successor_validation_registration.md
  stage1_report: outputs/reports/successor_validation_stage1_screening.md
  stage1_csv: outputs/reports/successor_validation_stage1_screening.csv
  stage1_json: outputs/reports/successor_validation_stage1_screening.json
  stage2_report: outputs/reports/successor_validation_stage2_fairness.md
  stage2_csv: outputs/reports/successor_validation_stage2_fairness.csv
  stage2_json: outputs/reports/successor_validation_stage2_fairness.json
  route_raw_markdown: outputs/reports/successor_validation_stage3_route_raw.md
  route_raw_csv: outputs/reports/successor_validation_stage3_route_raw.csv
  route_report: outputs/reports/successor_validation_stage3_route.md
  route_csv: outputs/reports/successor_validation_stage3_route.csv
  route_json: outputs/reports/successor_validation_stage3_route.json
  decision_memo: outputs/reports/successor_validation_decision_memo.md
