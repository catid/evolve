analysis:
  program_label: 2x-scale Deadlock Escape, Practicalization, and Architecture-Specialist Program
  prior_escape_stage1_json: outputs/reports/escape_distill_stageB1_rescue_screening.json
  accepted_source_quality_report: outputs/reports/escape_distill_stageA2_source_quality.md
  accepted_source_quality_json: outputs/reports/escape_distill_stageA2_source_quality.json
  architecture_stage1_train_root: outputs/experiments/lss_architecture_specialist_program/stageB1_train
  architecture_incumbent_candidate: keyed_residual
  architecture_challenger_candidate: weak_base_expert_gate
  source_quality_architecture_reports:
    - outputs/reports/architecture_route_bias_probe.md
    - outputs/reports/architecture_route_bias_keyed_residual_probe.md
    - outputs/reports/architecture_route_bias_keyed_residual_weak_base_expert_gate_probe.md
    - outputs/reports/architecture_route_bias_keyed_residual_weak_base_margin_bonus_expert_gate_probe.md
  current_gate_report: outputs/reports/deadlock_oracle_gate_report.md
  current_gate_report_json: outputs/reports/deadlock_oracle_gate_report.json
  current_stability_report: outputs/reports/deadlock_oracle_stageB6_stability.md
  current_stability_json: outputs/reports/deadlock_oracle_stageB6_stability.json
  current_route_report: outputs/reports/deadlock_oracle_stageB6_route_validation.md
  current_route_json: outputs/reports/deadlock_oracle_stageB6_route_validation.json
  current_oracle_inference_report: outputs/reports/oracle_stageA5_inference_escape.md
  current_oracle_inference_json: outputs/reports/oracle_stageA5_inference_escape.json
  detector_trace_episodes: 32
  rescue_screening_episodes: 32
  rescue_validation_episodes: 64
  rescue_max_steps: 256
  detector:
    stall_window: 6
    repeated_position_window: 6
    low_unique_ratio_threshold: 0.50
    high_confidence_threshold: 0.90
    low_confidence_threshold: 0.60
    high_route_pair_fraction: 0.55
    high_route_entropy_threshold: 0.90
    output_settle_action_switch_ceiling: 0.20
    output_settle_confidence_std_ceiling: 0.08
    route_settle_pair_switch_ceiling: 0.35
    route_settle_entropy_std_ceiling: 0.10
  teacher_locked_dev_groups:
    - label: teacher_locked_dev_primary
      cases:
        - [prospective_c, 193]
  teacher_locked_holdout_groups:
    - label: teacher_locked_holdout_primary
      cases:
        - [prospective_g, 251]
  ambiguous_groups:
    - label: ambiguous_primary
      cases:
        - [prospective_i, 283]
  guardrail_groups:
    - label: guardrail_primary
      cases:
        - [prospective_f, 239]
        - [prospective_f, 241]
  healthy_groups:
    - label: healthy_original
      cases:
        - [original, 7]
        - [original, 11]
    - label: healthy_fresh
      cases:
        - [fresh, 23]
        - [fresh, 29]
    - label: healthy_generalization
      cases:
        - [prospective_g, 257]
        - [prospective_g, 263]
  practicalization_families:
    - label: escape_distillation
      track: exploit
      candidates:
        - round10_search_x4_temp105
        - round10_search_x4_temp110
        - round10_conf_search_x4_temp105
        - round10_conf_search_x4_temp110
        - round10_conf_search_x6_temp105
        - round10_phase_memory_mix025_search_x4
        - round10_phase_memory_mix050_conf_search_x4
      hypothesis: if bounded rescue exposes real alternative action sequences, the smallest benchmark-lane approximation should be a warmer, slightly broader teacher-contract family.
      failure: teacher-locked dev stays in the incumbent tie bucket or healthy groups regress.
    - label: selective_teacher_contract
      track: exploit
      candidates:
        - round7_search_x4
        - round10_search_x2
        - round10_search_x4
        - round10_search_x6
        - round10_search_x4_atkey_x2
        - teacher_temp_090
        - teacher_temp_110
      hypothesis: rescue may imply the current family needs more controlled pre-key teacher divergence rather than a fully different policy class.
      failure: teacher-locked cases stay flat while guardrail cases lose routed wins.
    - label: selective_curriculum_repair
      track: exploit
      candidates:
        - round10_prekey_phase_balanced_4096
        - round10_prekey_phase_balanced_4096_temp105
        - round10_prekey_phase_balanced_4096_conf
        - round10_transition_phase_balanced_4096
        - round10_transition_phase_balanced_4096_temp105
        - phase_balanced_4096
        - phase_balanced_6144
        - cap_balanced_4096
      hypothesis: rescue-informed successful trajectories may still need only a narrow transition-state rebalance in the accepted family.
      failure: phase mix moves without a teacher-locked gain.
    - label: hybrid_selective
      track: exploit
      candidates:
        - round10_conf_search_x4_transition_temp105
        - teacher_conf_post4
        - teacher_conf_post5
        - cap_balanced_6144
      hypothesis: if rescue exposes both target and transition pressure, a small combined line should be the most plausible practical approximation.
      failure: the hybrid only recreates prior ties or adds new failures.
    - label: greedy_conversion
      track: exploit
      candidates:
        - round10_warm1_last_step
        - round10_warm2_last_step
        - round10_stoch25_last_two
        - round10_stoch50_last_two
        - settling_round10_last_step
        - round10_warm1_last_two
      hypothesis: if rescue signal appears sampled-first, a checkpoint-selection or temporal-credit family may be the cleanest greedy-conversion bridge inside the accepted family.
      failure: greedy dev stays flat or the line adds instability.
  architecture_specialist_entry:
    requires_bounded_rescue: true
    requires_failed_practicalization: true
    requires_source_quality_verdict: hidden_signal_but_weak_policy_formation

candidates:
  teacher_conf_post4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: teacher_confidence_weighting
    description: teacher-confidence weighting with post-unlock emphasis
    overrides:
      student:
        weighting: teacher_confidence
        phase_weights:
          post_unlock: 4.0
  teacher_conf_post5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: teacher_confidence_weighting
    description: stronger teacher-confidence weighting with post-unlock emphasis
    overrides:
      student:
        weighting: teacher_confidence
        phase_weights:
          post_unlock: 5.0
  phase_balanced_4096:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: phase_balanced_recent
    description: phase-balanced replay with post-unlock emphasis
    overrides:
      loop:
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  phase_balanced_6144:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: phase_balanced_recent
    description: larger phase-balanced replay with post-unlock emphasis
    overrides:
      loop:
        aggregation: phase_balanced_recent
        max_dataset_steps: 6144
        phase_quota_weights:
          default: 1.0
          post_unlock: 3.0
  cap_balanced_4096:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: cap_recent_balanced_replay
    description: cap-balanced recent replay
    overrides:
      loop:
        aggregation: cap_recent_balanced
        max_dataset_steps: 4096
  cap_balanced_6144:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: cap_recent_balanced_replay
    description: larger cap-balanced recent replay
    overrides:
      loop:
        aggregation: cap_recent_balanced
        max_dataset_steps: 6144
  teacher_temp_090:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: teacher_temperature
    description: cooler teacher logits within the same KL family
    overrides:
      teacher:
        temperature: 0.9
  teacher_temp_110:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: teacher_temperature
    description: warmer teacher logits within the same KL family
    overrides:
      teacher:
        temperature: 1.1

