seed: 7
tags:
  - minigrid
  - memory
  - por
  - context_film

env:
  suite: minigrid
  env_id: MiniGrid-MemoryS9-v0
  fully_observed: false
  max_episode_steps: 200
  num_envs: 8
  num_eval_envs: 8

model:
  variant: por
  hidden_size: 128
  token_dim: 64
  patch_size: 4
  encoder_layers: 2
  num_heads: 4
  dropout: 0.0
  option_count: 4
  termination_bias: 1.0
  por_option_context_film: true
  por_option_context_film_scale: 0.5

ppo:
  rollout_steps: 32
  total_updates: 48
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.00025
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

evaluation:
  episodes: 8
  greedy: true

logging:
  project: psmn-rl
  run_name: memory_por_switchy_context_film
  output_dir: outputs/experiments/memory_por_switchy_context_film
  tensorboard: false
  save_checkpoints: true

system:
  device: cuda
  deterministic: false
