analysis:
  program_label: Deadlock/Data-Contract Program
  current_gate_report: outputs/reports/deadlock_next_gate_report.md
  current_gate_report_json: outputs/reports/deadlock_next_gate_report.json
  source_stage1_root: outputs/experiments/lss_deadlock_contract_program/stageB1_screening
  parity_candidate: round7
  shortlist_max_directions: 4
  casebook_trace_episodes: 16
  casebook_max_steps: 256
  teacher_audit_cases:
    - lane: prospective_c
      seed: 193
    - lane: prospective_f
      seed: 241
    - lane: prospective_g
      seed: 251
    - lane: prospective_i
      seed: 283
  teacher_audit_offsets: [999, 1999]
  distribution_probe_candidates:
    - round6
    - round7
    - round10_search_x4
    - round10_conf_search_x4
    - round10_phase_balanced_4096
    - round10_cap_balanced_4096
    - round10_door3_post5
  distribution_probe_cases:
    - [prospective_c, 193]
    - [prospective_g, 251]
  shortlist:
    - label: actual_teacher_smoothing_repair
      track: exploit
      candidates:
        - round10_search_x4_temp105
        - round10_search_x4_temp110
        - round10_search_x6_temp105
        - round10_conf_search_x4_temp105
        - round10_conf_search_x4_temp110
        - round10_conf_search_x6_temp105
      hypothesis: prior deadlock-window "smoothing" probes actually sharpened the teacher because logits are divided by temperature; true smoothing above 1.0 may break the teacher-locked pre-key loop without discarding the routed policy family.
      failure: the canonical deadlock stays pre-key locked or healthy routed cases regress while the dev mean only ties round6.
    - label: prekey_phase_local_weighting
      track: exploit
      candidates:
        - round7_search_x4
        - round10_search_x2
        - round10_search_x4
        - round10_search_x6
        - round10_search_x4_atkey_x2
      hypothesis: the deadlock is phase-local enough that stronger search/at-key weighting can lift the deadlock family without changing the broader contract.
      failure: the candidates only recreate the 0.8333 deadlock-dev tie bucket and leave prospective_c/193 unresolved.
    - label: prekey_curriculum_rebalance
      track: exploit
      candidates:
        - round10_prekey_phase_balanced_4096
        - round10_prekey_phase_balanced_4096_temp105
        - round10_prekey_phase_balanced_4096_conf
        - round10_prekey_phase_balanced_4096_conf_temp105
        - round10_prekey_phase_balanced_6144
        - round10_prekey_cap_balanced_4096
      hypothesis: the distribution audit says the current learner-state collection oversharpens into search/at-key loops with almost no transition coverage, so a pre-key rebalance should do better than the older post-unlock replay/cap/bridge probes.
      failure: the candidate changes only path entropy or search/at-key fractions without creating a real deadlock-family edge.
    - label: recursive_contract_probe
      track: exploratory
      candidates:
        - round10_warm1_last_step
        - round10_warm2_last_step
        - round10_stoch25_last_two
        - round10_stoch50_last_two
        - round10_stoch75_last_two
        - settling_round10_last_step
        - settling_round10_last_two
      hypothesis: if the remaining ceiling is really a training-contract problem, a narrower round10-only recursive-credit bracket should surface it without another broad league.
      failure: the candidates re-enter the same deadlock-dev tie bucket or collapse below it with extra instability.

candidate_subset:
