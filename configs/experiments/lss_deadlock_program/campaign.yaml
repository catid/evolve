analysis:
  source_stage1_root: outputs/experiments/lss_next_round_campaign/stage2_screening
  parity_candidate: round7
  shortlist_max_directions: 5
  casebook_trace_episodes: 16
  casebook_max_steps: 256
  casebook_cases:
    - lane: prospective_c
      seed: 193
      note: canonical_teacher_locked_prekey_deadlock
    - lane: prospective_f
      seed: 241
      note: routed_early_phase_success_to_preserve
    - lane: prospective_g
      seed: 251
      note: holdout_shared_prekey_deadlock
    - lane: prospective_i
      seed: 283
      note: holdout_transient_token_escape_then_collapse
  shortlist:
    - label: frontier_and_selection_deadlock_probe
      track: exploit
      candidates:
        - round5
        - round7
        - round10
        - round11
        - select_round10_final
        - select_round10_mix025
      hypothesis: strongest current priors and hard-seed-aware selection rules might recover deadlock-family breadth without changing the family contract
      failure: ties below round6 or leaves prospective_c/193 and holdout deadlocks unchanged
    - label: prekey_phase_weighting
      track: exploit
      candidates:
        - round7_search_x4
        - round10_search_x2
        - round10_search_x4
        - round10_search_x6
        - round10_search_x4_atkey_x2
        - round10_search_x4_temp095
      hypothesis: explicitly upweighting search-key and at-key states can break the pre-key deadlock without sacrificing routed post-unlock competence
      failure: either no deadlock lift or new complete-seed failures on solved routed cases
    - label: deadlock_window_confidence_weighting
      track: exploit
      candidates:
        - round7_conf_search_x4
        - round10_conf_search_x2
        - round10_conf_search_x4
        - round10_conf_search_x6
        - round10_conf_search_x4_atkey_x2
        - round10_conf_temp095_search_x4
      hypothesis: confidence weighting restricted to the deadlock window may encourage teacher divergence only when the routed line is over-committed to the blocking teacher policy
      failure: remains teacher-locked on prospective_c/193 or collapses solved seeds through over-smoothing
    - label: recursive_contract_deadlock_bracket
      track: exploratory
      candidates:
        - round7_warm1_last_step
        - round10_warm1_last_step
        - round12_warm1_last_step
        - round10_warm2_last_step
        - round7_stoch50_last_two
        - round10_stoch50_last_two
        - round12_stoch50_last_two
        - round10_stoch25_last_two
      hypothesis: the deadlock may partly reflect a training-contract problem, where shorter-horizon or lightly detached credit helps learn a non-myopic transition operator in the pre-key phase
      failure: re-enters the same parity bucket with extra convergence tax or introduces new catastrophic misses
    - label: settling_boundary_probe
      track: exploratory
      candidates:
        - round10_stoch75_last_two
        - settling_round7_last_step
        - settling_round10_last_step
        - settling_round10_last_two
      hypothesis: if deadlock escape is real but fragile, settle-aware variants should surface it as a stability/selection effect rather than as a raw-final mean change
      failure: selection only reshuffles ties and does not produce a reproducible deadlock-family edge

