seed: 7
tags: ["experiment", "minigrid", "doorkey", "flat_dense", "control", "fair_retest"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 5
  checkpoint_interval: 20
env:
  suite: minigrid
  env_id: MiniGrid-DoorKey-5x5-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 64
  total_updates: 80
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.0003
  ent_coef: 0.001
model:
  variant: flat_dense
  hidden_size: 128
logging:
  run_name: experiment_minigrid_doorkey_flat_dense_ent1e3
  output_dir: outputs/experiments/sare_retest/minigrid_doorkey_flat_dense_ent1e3
evaluation:
  episodes: 16
  greedy: true
