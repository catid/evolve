    description: base round-4 post-unlock weighted prior carried forward into the saturation league
  select_round7_final:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    track: fruitful
    family: selection_tiebreak
    direction: selection_final_greedy
    description: checkpoint-selection proxy lane reusing the measured round7 lineage
    stage1_reuse_candidate: round7
    overrides:
      loop:
        rounds: 7
  select_round10_final:
