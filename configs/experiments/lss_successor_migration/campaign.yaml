  baseline_csv: outputs/reports/successor_migration_baseline_sync.csv
  baseline_json: outputs/reports/successor_migration_baseline_sync.json
  stage1_report: outputs/reports/successor_migration_stage1_screening.md
  stage1_csv: outputs/reports/successor_migration_stage1_screening.csv
  stage1_json: outputs/reports/successor_migration_stage1_screening.json
  stage2_report: outputs/reports/successor_migration_stage2_fairness.md
  stage2_csv: outputs/reports/successor_migration_stage2_fairness.csv
  stage2_json: outputs/reports/successor_migration_stage2_fairness.json
  stage3_report: outputs/reports/successor_migration_stage3_holdout.md
  stage3_csv: outputs/reports/successor_migration_stage3_holdout.csv
  stage3_json: outputs/reports/successor_migration_stage3_holdout.json
  stage4_report: outputs/reports/successor_migration_stage4_antiregression.md
  stage4_csv: outputs/reports/successor_migration_stage4_antiregression.csv
  stage4_json: outputs/reports/successor_migration_stage4_antiregression.json
  route_raw_dir: outputs/reports/successor_migration_stage5_route_raw
  stage5_report: outputs/reports/successor_migration_stage5_route_validation.md
  stage5_csv: outputs/reports/successor_migration_stage5_route_validation.csv
  stage5_json: outputs/reports/successor_migration_stage5_route_validation.json
  stage6_report: outputs/reports/successor_migration_stage6_stability.md
  stage6_csv: outputs/reports/successor_migration_stage6_stability.csv
  stage6_json: outputs/reports/successor_migration_stage6_stability.json
  candidate_summary_markdown: outputs/reports/successor_migration_candidate_summary.md
  candidate_metrics_json: outputs/reports/successor_migration_candidate_metrics.json
  candidate_combined_markdown: outputs/reports/successor_migration_candidate_combined_report.md
  candidate_combined_csv: outputs/reports/successor_migration_candidate_combined_report.csv
  candidate_retry_markdown: outputs/reports/successor_migration_candidate_retry_block_report.md
  candidate_retry_csv: outputs/reports/successor_migration_candidate_retry_block_report.csv
