schema_version: 1
name: lss_successor_migration
frozen_pack: outputs/reports/frozen_benchmark_pack.json
legacy_frozen_pack: outputs/reports/frozen_benchmark_pack.json
current_canonical_pack: outputs/reports/hard_family_saturation_successor_pack.json
current_canonical_name: round6
previous_candidate_pack: outputs/reports/post_pass_candidate_pack.json
base_candidate_template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml

evaluation:
  episodes: 64
  task: DoorKey
  path_key: external_policy_diagnostics

base_configs:
  flat_dense: configs/experiments/minigrid_doorkey_flat_dense_ent1e3.yaml
  token_dense: configs/experiments/minigrid_doorkey_token_dense_ent1e3.yaml
  single_expert: configs/experiments/minigrid_doorkey_single_expert_ent1e3.yaml
  sare: configs/experiments/minigrid_doorkey_sare_ent1e3.yaml

students:
  sare:
    config_name: sare_ent1e3.yaml
    run_name: sare_ent1e3
    output_label: kl_lss_sare
  token_dense:
    config_name: token_dense_ent1e3.yaml
    run_name: token_dense_ent1e3
    output_label: kl_lss_token_dense
  single_expert:
    config_name: single_expert_ent1e3.yaml
    run_name: single_expert_ent1e3
    output_label: kl_lss_single_expert

blocks:
  dev:
    - lane: prospective_g
      seeds: [251, 257, 263]
    - lane: prospective_h
      seeds: [269, 271, 277]
  holdout:
    - lane: prospective_i
      seeds: [281, 283, 293]
    - lane: prospective_j
      seeds: [307, 311, 313]
  healthy:
    - lane: original
      seeds: [7, 11, 19]
    - lane: fresh
      seeds: [23, 29, 31]
    - lane: fresh_extra
      seeds: [37, 41, 43]
  frozen_combined:
    - lane: original
      seeds: [7, 11, 19]
    - lane: fresh
      seeds: [23, 29, 31]
    - lane: fresh_extra
      seeds: [37, 41, 43]
    - lane: fresh_final
      seeds: [47, 53, 59]

lane_roots:
  prospective_g:
    teacher_root: outputs/experiments/lss_successor_stress_extended/stage0_blocks/prospective_g
    sare_student_root: outputs/experiments/lss_successor_stress_extended/stage0_blocks/prospective_g
    token_student_root: outputs/experiments/lss_successor_stress_extended/stage0_blocks/prospective_g
    single_expert_root: outputs/experiments/lss_successor_stress_extended/stage0_blocks/prospective_g
  prospective_h:
    teacher_root: outputs/experiments/lss_successor_stress_extended/stage0_blocks/prospective_h
    sare_student_root: outputs/experiments/lss_successor_stress_extended/stage0_blocks/prospective_h
    token_student_root: outputs/experiments/lss_successor_stress_extended/stage0_blocks/prospective_h
    single_expert_root: outputs/experiments/lss_successor_stress_extended/stage0_blocks/prospective_h
  prospective_i:
    teacher_root: outputs/experiments/lss_successor_tiebreak/stage0_blocks/prospective_i
    sare_student_root: outputs/experiments/lss_successor_tiebreak/stage0_blocks/prospective_i
    token_student_root: outputs/experiments/lss_successor_tiebreak/stage0_blocks/prospective_i
    single_expert_root: outputs/experiments/lss_successor_tiebreak/stage0_blocks/prospective_i
  prospective_j:
    teacher_root: outputs/experiments/lss_successor_tiebreak/stage0_blocks/prospective_j
    sare_student_root: outputs/experiments/lss_successor_tiebreak/stage0_blocks/prospective_j
    token_student_root: outputs/experiments/lss_successor_tiebreak/stage0_blocks/prospective_j
    single_expert_root: outputs/experiments/lss_successor_tiebreak/stage0_blocks/prospective_j
  original:
    teacher_root: outputs/reproductions/lss_robustness_baseline
    sare_student_root: outputs/reproductions/lss_robustness_baseline
    token_student_root: outputs/reproductions/lss_robustness_baseline
    single_expert_root: outputs/experiments/lss_claim_broadening/single_expert_controls
  fresh:
    teacher_root: outputs/experiments/lss_claim_hardening/additional_seeds
    sare_student_root: outputs/experiments/lss_claim_hardening/additional_seeds
    token_student_root: outputs/experiments/lss_claim_hardening/additional_seeds
    single_expert_root: outputs/experiments/lss_multi_expert_hardening/fresh_single_expert_controls
  fresh_extra:
    teacher_root: outputs/experiments/lss_claim_broadening/additional_fresh_block
    sare_student_root: outputs/experiments/lss_claim_broadening/additional_fresh_block
    token_student_root: outputs/experiments/lss_claim_broadening/additional_fresh_block
    single_expert_root: outputs/experiments/lss_multi_expert_hardening/fresh_extra_single_expert_controls
  fresh_final:
    teacher_root: outputs/experiments/lss_multi_expert_hardening/final_fresh_block
    sare_student_root: outputs/experiments/lss_multi_expert_hardening/final_fresh_block
    token_student_root: outputs/experiments/lss_multi_expert_hardening/final_fresh_block
    single_expert_root: outputs/experiments/lss_frozen_claim/final_block_single_expert_controls

current_round6_sare_roots:
  prospective_g: outputs/experiments/lss_successor_stress_extended/stage1_screening/round6/prospective_g
  prospective_h: outputs/experiments/lss_successor_stress_extended/stage1_screening/round6/prospective_h
  prospective_i: outputs/experiments/lss_successor_tiebreak/stage1_screening/round6/prospective_i
  prospective_j: outputs/experiments/lss_successor_tiebreak/stage1_screening/round6/prospective_j
  original: outputs/experiments/lss_hard_family_saturation/stage4_antiregression/round6/original
  fresh: outputs/experiments/lss_hard_family_saturation/stage4_antiregression/round6/fresh
  fresh_extra: outputs/experiments/lss_hard_family_saturation/stage4_antiregression/round6/fresh_extra
  fresh_final: outputs/experiments/lss_hard_family_saturation/stage3_holdout/round6/fresh_final

current_round6_control_roots:
  prospective_g: outputs/experiments/lss_successor_stress_extended/stage2_controls/round6/prospective_g
  prospective_h: outputs/experiments/lss_successor_stress_extended/stage2_controls/round6/prospective_h
  prospective_i: outputs/experiments/lss_successor_tiebreak/stage2_controls/round6/prospective_i
  prospective_j: outputs/experiments/lss_successor_tiebreak/stage2_controls/round6/prospective_j
  original: outputs/experiments/lss_hard_family_saturation/stage4_antiregression/round6/original
  fresh: outputs/experiments/lss_hard_family_saturation/stage4_antiregression/round6/fresh
  fresh_extra: outputs/experiments/lss_hard_family_saturation/stage4_antiregression/round6/fresh_extra
  fresh_final: outputs/experiments/lss_hard_family_saturation/stage3_holdout/round6/fresh_final

candidates:
  round5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: cleanup_round_extension
    description: shorter cleanup-round challenger
    overrides:
      loop:
        rounds: 5
  round7:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: cleanup_round_extension
    description: one-more-round cleanup challenger
    overrides:
      loop:
        rounds: 7
  post_unlock_x5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: post_unlock_weight_schedule
    description: stronger post-unlock KL weighting
    overrides:
      student:
        phase_weights:
          post_unlock: 5.0
  post_unlock_x6:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: post_unlock_weight_schedule
    description: strongest bounded post-unlock KL weighting
    overrides:
      student:
        phase_weights:
          post_unlock: 6.0
  disagree050:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: disagreement_threshold_weighting
    description: modest disagreement bonus
    overrides:
      student:
        disagreement_bonus: 0.5
  disagree100:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: disagreement_threshold_weighting
    description: strong disagreement bonus
    overrides:
      student:
        disagreement_bonus: 1.0
  door2_post4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: locked_door_bridge_weighting
    description: locked-door bridge weighting
    overrides:
      student:
        phase_weights:
          at_locked_door: 2.0
          post_unlock: 4.0
  door3_post5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: locked_door_bridge_weighting
    description: stronger locked-door bridge weighting
    overrides:
      student:
        phase_weights:
          at_locked_door: 3.0
          post_unlock: 5.0
  carry2_post4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: carry_key_bridge_weighting
    description: carry-key bridge weighting
    overrides:
      student:
        phase_weights:
          carry_key: 2.0
          post_unlock: 4.0
  carry3_post5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: carry_key_bridge_weighting
    description: stronger carry-key bridge weighting
    overrides:
      student:
        phase_weights:
          carry_key: 3.0
          post_unlock: 5.0
  round5_phase_balanced_dis050:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: cleanup_round_phase_balanced_disagreement
    description: cleanup-round plus phase-balanced disagreement weighting
    overrides:
      student:
        disagreement_bonus: 0.5
      loop:
        rounds: 5
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  round5_phase_balanced_dis100:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: cleanup_round_phase_balanced_disagreement
    description: stronger cleanup-round plus phase-balanced disagreement weighting
    overrides:
      student:
        disagreement_bonus: 1.0
      loop:
        rounds: 5
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5

selection:
  stage1_top_k: 4
  stage2_top_k: 2
  min_dev_gain: 0.02
  min_holdout_gain: 0.01
  control_eps: 0.02
  margin_eps: 0.01
  anti_regression_tolerance: 0.02
  route_drop_min: 0.50
  route_randomization_drop_min: 0.25
  pack_gate_required_verdict: "PASS: thaw consideration allowed"

historical_reports:
  - outputs/reports/successor_validation_decision_memo.md
  - outputs/reports/successor_challenge_decision_memo.md
  - outputs/reports/successor_stress_decision_memo.md
  - outputs/reports/successor_stress_followup_decision_memo.md
  - outputs/reports/successor_stress_extended_decision_memo.md
  - outputs/reports/successor_tiebreak_decision_memo.md

route_cases:
  dev:
    lane: prospective_h
    seed: 269
  holdout:
    lane: prospective_i
    seed: 281
  healthy:
    lane: fresh
    seed: 23

stability_cases:
  dev:
    lane: prospective_h
    seed: 269
  holdout:
    lane: prospective_i
    seed: 281
  healthy:
    lane: fresh
    seed: 23

stage_roots:
  stage1_screening: outputs/experiments/lss_successor_migration/stage1_screening
  stage2_fairness: outputs/experiments/lss_successor_migration/stage2_fairness
  stage3_holdout: outputs/experiments/lss_successor_migration/stage3_holdout
  stage4_antiregression: outputs/experiments/lss_successor_migration/stage4_antiregression
