seed: 7
tags: ["experiment", "minigrid", "doorkey", "token_dense", "control", "entropy_sweep"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 5
  checkpoint_interval: 20
env:
  suite: minigrid
  env_id: MiniGrid-DoorKey-5x5-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 64
  total_updates: 80
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.0003
  ent_coef: 0.0
model:
  variant: token_dense
  hidden_size: 128
  token_dim: 128
  encoder_layers: 2
  num_heads: 4
logging:
  run_name: experiment_minigrid_doorkey_token_dense_ent0
  output_dir: outputs/experiments/token_recovery/minigrid_doorkey_token_dense_ent0
evaluation:
  episodes: 16
  greedy: true
