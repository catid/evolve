seed: 7
tags: ["experiment", "minigrid", "keycorridor", "single_expert", "control"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 5
  checkpoint_interval: 20
env:
  suite: minigrid
  env_id: MiniGrid-KeyCorridorS3R1-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 64
  total_updates: 120
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.0003
model:
  variant: single_expert
  hidden_size: 128
  token_dim: 128
  expert_hidden_size: 256
logging:
  run_name: experiment_minigrid_keycorridor_single_expert
  output_dir: outputs/experiments/baselines/minigrid_keycorridor_single_expert
evaluation:
  episodes: 16
  greedy: true
