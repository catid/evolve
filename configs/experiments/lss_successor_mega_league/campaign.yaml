      seeds: [73, 79, 83]
    - lane: post_pass_c
      seeds: [89, 97, 101]
    - lane: post_pass_f
      seeds: [137, 139, 149]
  holdout:
    - lane: fresh_final
      seeds: [47, 53, 59]
    - lane: post_pass_e
      seeds: [113, 127, 131]
    - lane: prospective_i
      seeds: [281, 283, 293]
  healthy:
    - lane: original
      seeds: [7, 11, 19]
    - lane: fresh
      seeds: [23, 29, 31]
    - lane: fresh_extra
      seeds: [37, 41, 43]
  frozen_combined:
    - lane: original
      seeds: [7, 11, 19]
    - lane: fresh
      seeds: [23, 29, 31]
    - lane: fresh_extra
      seeds: [37, 41, 43]
    - lane: fresh_final
      seeds: [47, 53, 59]

