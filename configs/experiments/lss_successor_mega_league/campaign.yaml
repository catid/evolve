candidates:
  round5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: round_selection
    description: shorter cleanup-round challenger
    overrides:
      loop:
        rounds: 5
  round7:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: round_selection
    description: one-more-round cleanup challenger
    overrides:
      loop:
        rounds: 7
  post_unlock_x5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: post_unlock_weight_schedule
    description: stronger post-unlock KL weighting
    overrides:
      student:
        phase_weights:
          post_unlock: 5.0
  post_unlock_x6:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: post_unlock_weight_schedule
    description: strongest bounded post-unlock KL weighting
    overrides:
      student:
        phase_weights:
          post_unlock: 6.0
  disagree050:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: disagreement_threshold_weighting
    description: modest disagreement bonus
    overrides:
      student:
        disagreement_bonus: 0.5
  disagree100:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: disagreement_threshold_weighting
    description: strong disagreement bonus
    overrides:
      student:
        disagreement_bonus: 1.0
  door2_post4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: locked_door_bridge_weighting
    description: locked-door bridge weighting
    overrides:
      student:
        phase_weights:
          at_locked_door: 2.0
          post_unlock: 4.0
  door3_post5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: locked_door_bridge_weighting
    description: stronger locked-door bridge weighting
    overrides:
      student:
        phase_weights:
          at_locked_door: 3.0
          post_unlock: 5.0
  carry2_post4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: carry_key_bridge_weighting
    description: carry-key bridge weighting
    overrides:
      student:
        phase_weights:
          carry_key: 2.0
          post_unlock: 4.0
  carry3_post5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: carry_key_bridge_weighting
    description: stronger carry-key bridge weighting
    overrides:
      student:
        phase_weights:
          carry_key: 3.0
          post_unlock: 5.0
  teacher_conf_post4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: teacher_confidence_weighting
    description: teacher-confidence weighting with post-unlock emphasis
    overrides:
      student:
        weighting: teacher_confidence
        phase_weights:
          post_unlock: 4.0
  teacher_conf_post5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: teacher_confidence_weighting
    description: stronger teacher-confidence weighting with post-unlock emphasis
    overrides:
      student:
        weighting: teacher_confidence
        phase_weights:
          post_unlock: 5.0
  round5_phase_balanced_4096:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: round5_phase_balanced_recent
    description: round-5 phase-balanced replay
    overrides:
      loop:
        rounds: 5
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  round5_phase_balanced_6144:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: round5_phase_balanced_recent
    description: deeper round-5 phase-balanced replay
    overrides:
      loop:
        rounds: 5
        aggregation: phase_balanced_recent
        max_dataset_steps: 6144
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  round5_phase_balanced_dis050:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: round5_phase_balanced_disagreement
    description: round-5 phase-balanced replay with disagreement bonus
    overrides:
      student:
        disagreement_bonus: 0.5
      loop:
        rounds: 5
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  round5_phase_balanced_dis100:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: round5_phase_balanced_disagreement
    description: stronger round-5 phase-balanced replay with disagreement bonus
    overrides:
      student:
        disagreement_bonus: 1.0
      loop:
        rounds: 5
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  phase_balanced_4096:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: phase_balanced_recent
    description: phase-balanced replay with post-unlock emphasis
    overrides:
      loop:
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  phase_balanced_6144:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: phase_balanced_recent
    description: larger phase-balanced replay with post-unlock emphasis
    overrides:
      loop:
        aggregation: phase_balanced_recent
        max_dataset_steps: 6144
        phase_quota_weights:
          default: 1.0
          post_unlock: 3.0
  cap_balanced_4096:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: cap_recent_balanced_replay
    description: cap-balanced recent replay
    overrides:
      loop:
        aggregation: cap_recent_balanced
        max_dataset_steps: 4096
  cap_balanced_6144:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: cap_recent_balanced_replay
    description: larger cap-balanced recent replay
    overrides:
      loop:
        aggregation: cap_recent_balanced
        max_dataset_steps: 6144
  cap_recent_4096:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: cap_recent_replay
    description: bounded cap-recent replay
    overrides:
      loop:
        aggregation: cap_recent
        max_dataset_steps: 4096
  cap_recent_8192:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: cap_recent_replay
    description: larger cap-recent replay
    overrides:
      loop:
        aggregation: cap_recent
        max_dataset_steps: 8192
  phase_postunlock_4096:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    direction: phase_postunlock_recent
    description: phase-balanced replay with stronger post-unlock quota
    overrides:
      loop:
