  fresh_final:
    teacher_root: outputs/experiments/lss_multi_expert_hardening/final_fresh_block
    sare_student_root: outputs/experiments/lss_multi_expert_hardening/final_fresh_block
    token_student_root: outputs/experiments/lss_multi_expert_hardening/final_fresh_block
    single_expert_root: outputs/experiments/lss_frozen_claim/final_block_single_expert_controls

stage_roots:
  stage0_blocks: outputs/experiments/lss_hard_family_saturation/stage0_blocks
  stage2_dev: outputs/experiments/lss_hard_family_saturation/stage1_screening
  stage3_fairness: outputs/experiments/lss_hard_family_saturation/stage2_fairness
  stage4_holdout: outputs/experiments/lss_hard_family_saturation/stage3_holdout
  stage5_antiregression: outputs/experiments/lss_hard_family_saturation/stage4_antiregression
  stage8_pack: outputs/experiments/lss_hard_family_saturation/stage7_pack

candidates:
  post_unlock_x5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: post_unlock_weight_schedule
    hypothesis: stronger post-unlock KL alone may finish the late cleanup states that still sink routed SARE on the hard family.
    hard_family_target: pushes more KL mass onto the exact post-unlock states where post_pass_b and post_pass_c still trail token_dense.
    broader_risk: overweights late cleanup and can flatten healthy-block route diversity.
    overrides:
      student:
        phase_weights:
          post_unlock: 5.0
  post_unlock_x6:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: post_unlock_weight_schedule
    hypothesis: a still stronger post-unlock KL may close the remaining hard-family token gap when x5 is not enough.
    hard_family_target: attacks the same late cleanup states with a more aggressive post-unlock emphasis.
    broader_risk: can overfit late states and create brittle checkpoint spikes.
    overrides:
      student:
        phase_weights:
          post_unlock: 6.0
  door2_post4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: locked_door_bridge_weighting
    hypothesis: weighting the approach-to-door phase may preserve the context needed for post-unlock cleanup on hard-family seeds.
    hard_family_target: keeps at_locked_door states visible before the post-unlock correction begins.
    broader_risk: may spend KL budget on already-solved door-approach states and blunt the late-phase gain.
    overrides:
      student:
        phase_weights:
          at_locked_door: 2.0
          post_unlock: 4.0
  door3_post5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: locked_door_bridge_weighting
    hypothesis: a heavier locked-door bridge plus stronger post-unlock weight may improve late-phase continuity on the hard family.
    hard_family_target: biases the learner-state loop toward the transition from locked door to successful cleanup.
    broader_risk: can overweight a narrow phase transition and miss healthy-block exploration context.
    overrides:
      student:
        phase_weights:
          at_locked_door: 3.0
          post_unlock: 5.0
  carry2_post4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: carry_key_bridge_weighting
    hypothesis: keeping carry-key states slightly hotter may reduce hard-family late collapse by preserving pre-door context.
    hard_family_target: compensates for dev seeds where the routed student drifts before door interaction and pays for it after unlock.
    broader_risk: may dilute the post-unlock fix and help healthy blocks more than the hard family.
    overrides:
      student:
        phase_weights:
          carry_key: 2.0
          post_unlock: 4.0
  carry3_post5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: carry_key_bridge_weighting
    hypothesis: a stronger carry-key bridge plus stronger post-unlock weight may stabilize the full late trajectory on hard-family seeds.
    hard_family_target: emphasizes the final approach-to-door sequence before the problematic cleanup segment.
    broader_risk: can turn into a generic structured-student improvement that does not help routed SARE specifically.
    overrides:
      student:
        phase_weights:
          carry_key: 3.0
          post_unlock: 5.0
  disagree050:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: disagreement_threshold_weighting
    hypothesis: a modest disagreement bonus can amplify the exact late states where routed SARE still diverges from the teacher on the hard family.
    hard_family_target: focuses learning on post-unlock disagreement pockets without changing the extraction family.
    broader_risk: may overreact to noisy disagreement and destabilize healthy blocks.
    overrides:
      student:
        disagreement_bonus: 0.5
  disagree100:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: disagreement_threshold_weighting
    hypothesis: a larger disagreement bonus may be needed if the hard-family mismatch is still too sparse for weaker bonuses.
    hard_family_target: saturates the late disagreement signal that remains after the current post-unlock weighting.
    broader_risk: can chase transient disagreement spikes instead of durable routed behavior.
    overrides:
      student:
        disagreement_bonus: 1.0
  teacher_conf_post4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: late_confidence_weighting
    hypothesis: teacher-confidence weighting can prioritize the high-certainty late states that routed SARE still misses on hard-family seeds.
    hard_family_target: focuses KL on post-unlock states where the teacher is decisive and the student still lags.
    broader_risk: may erase useful low-confidence correction states and help token_dense more than routed SARE.
    overrides:
      student:
        weighting: teacher_confidence
        phase_weights:
          post_unlock: 4.0
  teacher_conf_post5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: late_confidence_weighting
    hypothesis: stronger post-unlock confidence weighting may be needed if the hard-family gap is concentrated in very decisive cleanup states.
    hard_family_target: couples teacher-confidence and stronger post-unlock emphasis on the same late states.
    broader_risk: can collapse the learner-state dataset onto a tiny late slice and produce brittle wins.
    overrides:
      student:
        weighting: teacher_confidence
        phase_weights:
          post_unlock: 5.0
  round5:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: cleanup_round_extension
    hypothesis: one extra learner-state cleanup round may finish near-miss hard-family episodes without changing the base weighting shape.
    hard_family_target: extends the existing post-unlock candidate through one more correction round.
    broader_risk: can create a narrow late-round checkpoint spike and regress healthy blocks.
    overrides:
      loop:
        rounds: 5
  round6:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: cleanup_round_extension
    hypothesis: two extra rounds may be needed if the hard-family fix requires a longer cleanup tail than the current candidate allows.
    hard_family_target: further extends late cleanup on the same learner-state path.
    broader_risk: makes stale data accumulation worse if the family is not actually round-limited.
    overrides:
      loop:
        rounds: 6
  phase_balanced_4096:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: phase_balanced_recent_replay
    hypothesis: a bounded phase-balanced recent buffer can protect hard-family late states from stale append-all domination.
    hard_family_target: preserves post-unlock coverage while trimming long failed histories.
    broader_risk: may discard useful early context on healthy blocks.
    overrides:
      loop:
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  phase_balanced_6144:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: phase_balanced_recent_replay
    hypothesis: a slightly larger phase-balanced buffer may keep more useful context while still protecting late hard-family states.
    hard_family_target: softens stale-data pressure without shrinking the replay window too aggressively.
    broader_risk: can drift back toward append-all behavior and lose the hard-family benefit.
    overrides:
      loop:
        aggregation: phase_balanced_recent
        max_dataset_steps: 6144
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  cap_balanced_4096:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: balanced_recent_replay
    hypothesis: a balanced recent cap may control hard-family stale-data buildup without the stronger phase quotas.
    hard_family_target: trims old failed episodes while keeping the recent late-phase trajectory mix.
    broader_risk: may be too weak to close the token gap and still hurt healthy-block context.
    overrides:
      loop:
        aggregation: cap_recent_balanced
        max_dataset_steps: 4096
  cap_balanced_6144:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: balanced_recent_replay
    hypothesis: a larger balanced cap may give the hard family enough late coverage without phase quotas.
    hard_family_target: tests whether stale-data control alone is enough for the hard family.
    broader_risk: may neither solve the hard family nor preserve healthy-block strength.
    overrides:
      loop:
        aggregation: cap_recent_balanced
        max_dataset_steps: 6144
  round5_phase_balanced_4096:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: cleanup_round_plus_phase_balanced_replay
    hypothesis: the strongest prior signal may need both one extra cleanup round and a phase-balanced recent buffer.
    hard_family_target: combines late cleanup extension with stale-data control on the hard-family dev split.
    broader_risk: can over-specialize to dev blocks and erode healthy-block robustness.
    overrides:
      loop:
        rounds: 5
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  round5_phase_balanced_6144:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: cleanup_round_plus_phase_balanced_replay
    hypothesis: the same mixed mechanism may need a wider recent buffer to carry enough context into hard-family cleanup.
    hard_family_target: tests whether the round-5 plus phase-balanced idea survives a less aggressive cap.
    broader_risk: can give back the stale-data benefit while still paying the extra-round cost.
    overrides:
      loop:
        rounds: 5
        aggregation: phase_balanced_recent
        max_dataset_steps: 6144
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  round5_phase_balanced_dis050:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: cleanup_round_phase_balanced_disagreement
    hypothesis: a modest disagreement bonus on top of the best mixed replay shape may focus the hard-family late mismatches more precisely.
    hard_family_target: combines stale-data control, extra cleanup, and disagreement targeting on the same hard-family slice.
    broader_risk: may over-focus on disagreement-heavy failures and create brittle wins.
    overrides:
      student:
        disagreement_bonus: 0.5
      loop:
        rounds: 5
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5
  round5_phase_balanced_dis100:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    intervention_family: cleanup_round_phase_balanced_disagreement
    hypothesis: the strongest disagreement-targeted mixed variant may be required if the remaining hard-family errors are still sparse and late.
    hard_family_target: saturates the combined cleanup, replay, and disagreement hypothesis on the hard-family dev split.
    broader_risk: can overshoot and turn the program into a late-phase overfit.
    overrides:
      student:
        disagreement_bonus: 1.0
      loop:
        rounds: 5
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          post_unlock: 2.5

