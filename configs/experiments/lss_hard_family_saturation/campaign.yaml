schema_version: 1
name: lss_hard_family_saturation
frozen_manifest: configs/claims/doorkey_frozen_claim.yaml
frozen_pack: outputs/reports/frozen_benchmark_pack.json
frozen_combined_csv: outputs/reports/lss_frozen_claim_updated_combined_doorkey_report.csv
current_candidate_pack: outputs/reports/post_pass_candidate_pack.json
canonical_teacher: flat_dense
current_candidate_name: post_unlock_weighted
base_candidate_template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml

evaluation:
  episodes: 64
  task: DoorKey
  path_key: external_policy_diagnostics

base_configs:
  flat_dense: configs/experiments/minigrid_doorkey_flat_dense_ent1e3.yaml
  token_dense: configs/experiments/minigrid_doorkey_token_dense_ent1e3.yaml
  single_expert: configs/experiments/minigrid_doorkey_single_expert_ent1e3.yaml
  sare: configs/experiments/minigrid_doorkey_sare_ent1e3.yaml

students:
  sare:
    config_name: sare_ent1e3.yaml
    run_name: sare_ent1e3
    output_label: kl_lss_sare
  token_dense:
    config_name: token_dense_ent1e3.yaml
    run_name: token_dense_ent1e3
    output_label: kl_lss_token_dense
  single_expert:
    config_name: single_expert_ent1e3.yaml
    run_name: single_expert_ent1e3
    output_label: kl_lss_single_expert

selection:
  hard_family_min_token_gap: 0.05
  hard_family_min_token_mean: 0.75
  dev_new_block_count: 1
  holdout_new_block_count: 1
  stage2_advance_limit: 4
  stage3_advance_limit: 2

seed_groups:
  known_hard_dev:
    blocks:
      - lane: post_pass_b
        seeds: [73, 79, 83]
      - lane: post_pass_c
        seeds: [89, 97, 101]
  new_block_pool:
    blocks:
      - lane: post_pass_d
        seeds: [103, 107, 109]
      - lane: post_pass_e
        seeds: [113, 127, 131]
      - lane: post_pass_f
        seeds: [137, 139, 149]
  existing_hard_holdout:
    blocks:
      - lane: fresh_final
        seeds: [47, 53, 59]
  healthy_blocks:
    blocks:
      - lane: original
        seeds: [7, 11, 19]
      - lane: fresh
        seeds: [23, 29, 31]
      - lane: fresh_extra
        seeds: [37, 41, 43]
      - lane: post_pass_a
        seeds: [61, 67, 71]
  frozen_combined:
    blocks:
      - lane: original
        seeds: [7, 11, 19]
      - lane: fresh
        seeds: [23, 29, 31]
      - lane: fresh_extra
        seeds: [37, 41, 43]
      - lane: fresh_final
        seeds: [47, 53, 59]

current_candidate_roots:
  post_pass_a: outputs/experiments/lss_post_pass_campaign/stage1/post_pass_a
  post_pass_b: outputs/experiments/lss_post_pass_campaign/stage1/post_pass_b
  post_pass_c: outputs/experiments/lss_canonization_campaign/stage2_rerun/candidates/post_unlock_weighted/post_pass_c
  post_pass_d: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_d
  post_pass_e: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_e
  post_pass_f: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_f
  original: outputs/experiments/lss_long_campaign/stage4/post_unlock_weighted/original
  fresh: outputs/experiments/lss_long_campaign/stage4/post_unlock_weighted/fresh
  fresh_extra: outputs/experiments/lss_long_campaign/stage4/post_unlock_weighted/fresh_extra
  fresh_final: outputs/experiments/lss_long_campaign/stage3/post_unlock_weighted/fresh_final

lane_roots:
  post_pass_a:
    teacher_root: outputs/experiments/lss_post_pass_campaign/stage1/post_pass_a
    sare_student_root: outputs/experiments/lss_post_pass_campaign/stage1/post_pass_a
    token_student_root: outputs/experiments/lss_post_pass_campaign/stage1/post_pass_a
    single_expert_root: outputs/experiments/lss_post_pass_campaign/stage1/post_pass_a
  post_pass_b:
    teacher_root: outputs/experiments/lss_post_pass_campaign/stage1/post_pass_b
    sare_student_root: outputs/experiments/lss_post_pass_campaign/stage1/post_pass_b
    token_student_root: outputs/experiments/lss_post_pass_campaign/stage1/post_pass_b
    single_expert_root: outputs/experiments/lss_post_pass_campaign/stage1/post_pass_b
  post_pass_c:
    teacher_root: outputs/experiments/lss_canonization_campaign/stage2_rerun/post_pass_c
    sare_student_root: outputs/experiments/lss_canonization_campaign/stage2_rerun/post_pass_c
    token_student_root: outputs/experiments/lss_canonization_campaign/stage2_rerun/post_pass_c
    single_expert_root: outputs/experiments/lss_canonization_campaign/stage2_rerun/post_pass_c
  post_pass_d:
    teacher_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_d
    sare_student_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_d
    token_student_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_d
    single_expert_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_d
  post_pass_e:
    teacher_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_e
    sare_student_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_e
    token_student_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_e
    single_expert_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_e
  post_pass_f:
    teacher_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_f
    sare_student_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_f
    token_student_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_f
    single_expert_root: outputs/experiments/lss_hard_family_saturation/stage0_blocks/post_pass_f
