analysis:
  program_label: Teacher-Target and Transition-Coverage Oracle Program
  current_gate_report: outputs/reports/deadlock_arch_gate_report.md
  current_gate_report_json: outputs/reports/deadlock_arch_gate_report.json
  source_stage1_root: outputs/experiments/lss_deadlock_arch_program/stageB1_screening
  shortlist_max_directions: 5
  oracle_case_groups:
    teacher_locked:
      - [prospective_c, 193]
      - [prospective_g, 251]
    ambiguous:
      - [prospective_i, 283]
    guardrail:
      - [prospective_f, 241]
  oracle_case_order:
    - teacher_locked
    - ambiguous
    - guardrail
  oracle_runs:
    teacher_target:
      baseline_candidate: oracle_teacher_base_search4
      candidates:
        - oracle_teacher_base_search4
        - oracle_teacher_temp105_search4
        - oracle_teacher_temp115_search4
        - oracle_teacher_confclip_search4
    transition_coverage:
      baseline_candidate: oracle_transition_base_search4
      candidates:
        - oracle_transition_base_search4
        - oracle_transition_phase_balanced_2048
        - oracle_transition_phase_balanced_4096
        - oracle_transition_phase_balanced_4096_temp105
    combined:
      baseline_candidate: oracle_combined_temp105_transition4096
      candidates:
        - oracle_combined_temp105_transition4096
        - oracle_combined_confclip_transition4096
  oracle_eval_episodes: 32
  oracle_eval_modes:
    - [greedy, true, 1.0]
    - [sampled_t1.0, false, 1.0]
    - [sampled_t0.7, false, 0.7]
    - [sampled_t0.5, false, 0.5]
  practical_shortlist:
    - label: selective_teacher_contract
      track: fruitful
      candidates:
        - round10_search_x4_temp105
        - round10_search_x4_temp110
        - round10_conf_search_x4_temp105
        - round10_conf_search_x4_temp110
        - round10_conf_search_x6_temp105
      hypothesis: the most practical within-family approximation to the teacher-target oracle is selective teacher smoothing on the teacher-locked pre-key window.
      failure: the teacher-locked deadlocks remain flat while the guardrail regresses.
    - label: transition_coverage_injection
      track: fruitful
      candidates:
        - round10_prekey_phase_balanced_4096
        - round10_prekey_phase_balanced_4096_temp105
        - round10_prekey_phase_balanced_4096_conf
        - round10_transition_phase_balanced_4096
        - round10_transition_phase_balanced_4096_temp105
      hypothesis: the most practical within-family approximation to the coverage oracle is stronger carry-key and locked-door replay pressure without leaving the accepted family.
      failure: the family only shifts mix and entropy without creating deadlock-family gains.
    - label: hybrid_teacher_plus_transition
      track: fruitful
      candidates:
        - round10_conf_search_x4_transition_temp105
      hypothesis: if the oracle signal is genuinely mixed, the main practical headroom should live in the joint teacher-plus-transition contract rather than either component alone.
      failure: the joint lane only ties round6 again and does not improve the teacher-locked subgroup.
    - label: recursive_contract_probe
      track: exploratory
      candidates:
        - round10_warm1_last_step
        - round10_warm2_last_step
        - round10_stoch25_last_two
        - round10_stoch50_last_two
        - settling_round10_last_step
        - round10_warm1_last_two
      hypothesis: a bounded training-contract adjustment may still matter if the oracle signal suggests some residual student-side deadlock escape failure.
      failure: the contract bracket only recreates the tie bucket or adds instability.
    - label: phase_memory_pilot
      track: archpilot
      candidates:
        - round10_phase_memory_mix025_search_x4
        - round10_phase_memory_mix050_conf_search_x4
      hypothesis: if the combined oracle still fails, a tiny quarantined phase-memory pilot is the smallest architecture-adjacent test of a real family ceiling.
      failure: the pilot cannot even match the incumbent deadlock-dev bucket or it weakens route structure enough to make a follow-on branch unjustified.
