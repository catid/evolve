oracle_candidates:
  oracle_teacher_base_search4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    oracle_stage: teacher_target
    description: baseline deadlock-window teacher contract with search-key x4 and no teacher correction
    overrides:
      loop:
        rounds: 4
        episodes_per_round: 32
        max_episodes_per_round: 48
      evaluation:
        episodes: 32
      student:
        phase_weights:
          search_key: 4.0
  oracle_teacher_temp105_search4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    oracle_stage: teacher_target
    description: deadlock-window teacher contract with true teacher smoothing at temperature 1.05
    overrides:
      loop:
        rounds: 4
        episodes_per_round: 32
        max_episodes_per_round: 48
      evaluation:
        episodes: 32
      teacher:
        temperature: 1.05
      student:
        phase_weights:
          search_key: 4.0
  oracle_teacher_temp115_search4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    oracle_stage: teacher_target
    description: deadlock-window teacher contract with stronger smoothing at temperature 1.15
    overrides:
      loop:
        rounds: 4
        episodes_per_round: 32
        max_episodes_per_round: 48
      evaluation:
        episodes: 32
      teacher:
        temperature: 1.15
      student:
        phase_weights:
          search_key: 4.0
  oracle_teacher_confclip_search4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    oracle_stage: teacher_target
    description: deadlock-window teacher contract with clipped teacher-confidence weighting on search-key states
    overrides:
      loop:
        rounds: 4
        episodes_per_round: 32
        max_episodes_per_round: 48
      evaluation:
        episodes: 32
      student:
        weighting: teacher_confidence
        teacher_confidence_floor: 0.70
        teacher_confidence_ceiling: 0.95
        phase_weights:
          search_key: 4.0
  oracle_transition_base_search4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    oracle_stage: transition_coverage
    description: baseline transition oracle lane with the current learner-state distribution and search-key x4
    overrides:
      loop:
        rounds: 4
        episodes_per_round: 32
        max_episodes_per_round: 48
      evaluation:
        episodes: 32
      student:
        phase_weights:
          search_key: 4.0
  oracle_transition_phase_balanced_2048:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    oracle_stage: transition_coverage
    description: transition-coverage oracle with phase-balanced replay at 2048 steps
    overrides:
      loop:
        rounds: 4
        episodes_per_round: 32
        max_episodes_per_round: 48
        aggregation: phase_balanced_recent
        max_dataset_steps: 2048
        phase_quota_weights:
          default: 1.0
          search_key: 1.0
          at_key: 1.0
          carry_key: 4.0
          at_locked_door: 4.0
          post_unlock: 2.0
      evaluation:
        episodes: 32
      student:
        phase_weights:
          search_key: 2.0
          at_key: 1.5
          carry_key: 3.0
          at_locked_door: 3.0
          post_unlock: 2.0
  oracle_transition_phase_balanced_4096:
