extends: ../lss_deadlock_arch_program/campaign.yaml
name: lss_deadlock_oracle_program

current_decision_memo: outputs/reports/deadlock_arch_decision_memo.md

decision_strings:
  replace: challenger replaces the active benchmark
  confirm: active benchmark confirmed and deadlock/data-contract frontier clarified
  narrow: active benchmark remains and the frontier narrows further
  narrow_state: benchmark state itself needs narrowing
  arch_future_branch: oracle evidence suggests a future architecture branch but not a benchmark change

selection:
  stage1_fruitful_top_k: 3
  stage1_exploratory_top_k: 2
  stage1_archpilot_top_k: 1
  stage2_top_k: 2
  min_dev_gain: 0.01

stage_roots:
