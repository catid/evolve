seed: 7
tags: ["experiment", "minigrid", "doorkey", "single_expert", "checkpoint_dynamics"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 5
  checkpoint_interval: 10
  archive_checkpoints: true
env:
  suite: minigrid
  env_id: MiniGrid-DoorKey-5x5-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 64
  total_updates: 80
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.0003
  ent_coef: 0.001
model:
  variant: single_expert
  hidden_size: 128
  token_dim: 128
  expert_count: 1
  top_k: 1
  expert_hidden_size: 256
  temperature: 1.0
logging:
  run_name: experiment_minigrid_doorkey_single_expert_ent1e3_ckptscan
  output_dir: outputs/experiments/greedy_recovery/checkpoint_dynamics/minigrid_doorkey_single_expert_ent1e3_ckptscan
evaluation:
  episodes: 16
  greedy: true
