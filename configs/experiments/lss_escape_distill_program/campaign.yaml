selection:
  min_dev_gain: 0.05
  rescue_family_top_k: 1
  rescue_holdout_min_gain: 0.02
  rescue_ambiguous_tolerance: 0.05

candidate_subset:
  - round10_search_x2
  - round10_search_x4
  - round10_search_x6
  - round10_search_x4_atkey_x2
  - round10_search_x4_temp105
  - round10_search_x4_temp110
  - round10_conf_search_x4_temp105
  - round10_conf_search_x4_temp110
  - round10_conf_search_x6_temp105
  - round10_prekey_phase_balanced_4096
  - round10_prekey_phase_balanced_4096_temp105
  - round10_prekey_phase_balanced_4096_conf
  - round10_transition_phase_balanced_4096
  - round10_transition_phase_balanced_4096_temp105
  - round10_conf_search_x4_transition_temp105
  - round10_warm1_last_step
  - round10_warm2_last_step
  - settling_round10_last_step
  - round10_warm1_last_two

analysis:
  program_label: 4-GPU Deadlock Escape, Source-Quality, and Practicalization Program
  prior_architecture_stage1_exploit_json: outputs/reports/architecture_stageB1_screening_exploit.json
  prior_architecture_stage1_explore_json: outputs/reports/architecture_stageB1_screening_explore.json
  source_quality_episodes: 4
  source_quality_max_steps: 96
  source_quality_branch_horizon: 24
  source_quality_max_branch_states_per_episode: 2
  architecture_stage1_train_root: outputs/experiments/lss_architecture_specialist_program/stageB1_train
  architecture_incumbent_candidate: keyed_residual
  architecture_challenger_candidate: weak_base_expert_gate
  source_quality_route_models:
    - round6
    - architecture_keyed_residual
    - architecture_weak_base_expert_gate
  source_quality_architecture_reports:
    - outputs/reports/architecture_route_bias_probe.md
    - outputs/reports/architecture_route_bias_keyed_residual_probe.md
    - outputs/reports/architecture_route_bias_keyed_residual_weak_base_expert_gate_probe.md
    - outputs/reports/architecture_route_bias_keyed_residual_weak_base_margin_bonus_expert_gate_probe.md
  current_gate_report: outputs/reports/deadlock_oracle_gate_report.md
  current_gate_report_json: outputs/reports/deadlock_oracle_gate_report.json
  current_stability_report: outputs/reports/deadlock_oracle_stageB6_stability.md
  current_stability_json: outputs/reports/deadlock_oracle_stageB6_stability.json
  current_route_report: outputs/reports/deadlock_oracle_stageB6_route_validation.md
  current_route_json: outputs/reports/deadlock_oracle_stageB6_route_validation.json
  current_oracle_inference_report: outputs/reports/oracle_stageA5_inference_escape.md
  current_oracle_inference_json: outputs/reports/oracle_stageA5_inference_escape.json
  detector_trace_episodes: 16
  rescue_screening_episodes: 32
  rescue_validation_episodes: 64
  rescue_max_steps: 256
  detector:
    stall_window: 6
    repeated_position_window: 6
    low_unique_ratio_threshold: 0.50
    high_confidence_threshold: 0.90
    low_confidence_threshold: 0.60
    high_route_pair_fraction: 0.55
    high_route_entropy_threshold: 0.90
    output_settle_action_switch_ceiling: 0.20
    output_settle_confidence_std_ceiling: 0.08
    route_settle_pair_switch_ceiling: 0.35
    route_settle_entropy_std_ceiling: 0.10
  teacher_locked_dev_groups:
    - label: teacher_locked_dev_primary
      cases:
        - [prospective_c, 191]
        - [prospective_c, 193]
    - label: teacher_locked_dev_secondary
      cases:
        - [prospective_c, 181]
  teacher_locked_holdout_groups:
    - label: teacher_locked_holdout_primary
      cases:
        - [prospective_g, 251]
        - [prospective_g, 257]
    - label: teacher_locked_holdout_secondary
      cases:
        - [prospective_g, 263]
  ambiguous_groups:
    - label: ambiguous_primary
      cases:
        - [prospective_i, 281]
        - [prospective_i, 283]
    - label: ambiguous_secondary
      cases:
        - [prospective_i, 293]
  guardrail_groups:
    - label: guardrail_primary
      cases:
        - [prospective_f, 239]
        - [prospective_f, 241]
  healthy_groups:
    - label: healthy_original
      cases:
        - [original, 7]
        - [original, 11]
    - label: healthy_fresh
      cases:
        - [fresh, 23]
        - [fresh, 29]
  practicalization_families:
    - label: escape_distillation
      track: exploit
      candidates:
        - round10_search_x4_temp105
        - round10_search_x4_temp110
        - round10_conf_search_x4_temp105
        - round10_conf_search_x4_temp110
        - round10_conf_search_x6_temp105
      hypothesis: if rescue turns teacher-locked deadlocks into successful sampled trajectories, a selective teacher-contract line should be the smallest benchmark-lane approximation.
      failure: teacher-locked dev stays in the incumbent tie bucket or healthy cases regress.
    - label: selective_teacher_contract
      track: exploit
      candidates:
        - round10_search_x2
        - round10_search_x4
        - round10_search_x6
        - round10_search_x4_atkey_x2
      hypothesis: rescue may imply the current family needs more early-phase divergence allowance before key pickup rather than a global contract change.
      failure: teacher-locked cases stay flat while guardrail cases lose routed wins.
    - label: selective_curriculum_repair
      track: exploit
      candidates:
        - round10_prekey_phase_balanced_4096
        - round10_prekey_phase_balanced_4096_temp105
        - round10_prekey_phase_balanced_4096_conf
        - round10_transition_phase_balanced_4096
        - round10_transition_phase_balanced_4096_temp105
      hypothesis: rescue-informed successful trajectories may still need only a narrow transition-state rebalance in the accepted family.
      failure: phase mix moves without a teacher-locked gain.
    - label: hybrid_selective
      track: exploit
      candidates:
        - round10_conf_search_x4_transition_temp105
      hypothesis: if rescue exposes both target and pre-key transition pressure, the joint line should be the most plausible practical approximation.
      failure: the hybrid only recreates prior ties or adds new failures.
    - label: rescue_informed_contract_probe
      track: exploratory
      candidates:
        - round10_warm1_last_step
        - round10_warm2_last_step
        - settling_round10_last_step
        - round10_warm1_last_two
      hypothesis: if rescue succeeds by tiny bounded divergence, a narrow terminal-credit contract tweak may be the least invasive training-side approximation.
      failure: the exploratory line stays below the incumbent or adds instability.

