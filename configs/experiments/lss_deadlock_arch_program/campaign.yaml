    family: transition_state_rebalance
    direction: transition_phase_balanced_recent_4096
    description: round10 with transition-state phase-balanced replay emphasizing carry-key and locked-door approach coverage
    overrides:
      loop:
        rounds: 10
        aggregation: phase_balanced_recent
        max_dataset_steps: 4096
        phase_quota_weights:
          default: 1.0
          search_key: 1.5
          at_key: 1.5
          carry_key: 4.0
          at_locked_door: 4.0
          post_unlock: 2.0
      student:
