analysis:
  program_label: Deadlock/Data-Contract + Architecture-Adjacent Program
  current_gate_report: outputs/reports/deadlock_contract_gate_report.md
  current_gate_report_json: outputs/reports/deadlock_contract_gate_report.json
  source_stage1_root: outputs/experiments/lss_deadlock_arch_program/stageB1_screening
  parity_candidate: round7
  shortlist_max_directions: 6
  transition_state_targets:
    - carry_key
    - at_locked_door
    - post_unlock
  shortlist:
    - label: actual_teacher_smoothing_repair
      track: fruitful
      candidates:
        - round10_search_x4_temp105
        - round10_search_x4_temp110
        - round10_search_x6_temp105
        - round10_conf_search_x4_temp105
        - round10_conf_search_x4_temp110
        - round10_conf_search_x6_temp105
      hypothesis: the canonical deadlocks are still teacher-locked enough that true teacher smoothing and confidence-clipped smoothing remain the highest-probability in-family repair.
      failure: the deadlock-dev mean only ties round6 again or the routed early-phase guardrail regresses.
    - label: prekey_phase_weighting
      track: fruitful
      candidates:
        - round7_search_x4
        - round10_search_x2
        - round10_search_x4
        - round10_search_x6
        - round10_search_x4_atkey_x2
      hypothesis: stronger early-phase weighting may still matter on the route-fragile subgroup even if it does not solve the teacher-locked sentinel by itself.
      failure: the candidates recreate the same 0.8333 deadlock-dev tie bucket and leave prospective_c/193 unresolved.
    - label: transition_state_rebalance
      track: fruitful
      candidates:
        - round10_prekey_phase_balanced_4096
        - round10_prekey_phase_balanced_4096_temp105
        - round10_prekey_phase_balanced_4096_conf
        - round10_prekey_phase_balanced_4096_conf_temp105
        - round10_prekey_phase_balanced_6144
        - round10_transition_phase_balanced_4096
        - round10_transition_phase_balanced_4096_temp105
        - round10_transition_phase_balanced_4096_conf
      hypothesis: the learner-state bottleneck is specifically missing carry-key and locked-door approach states, so transition-focused rebalancing should outperform earlier pre-key-only replay changes.
      failure: phase mix and entropy move without raising carry-key or locked-door coverage enough to change the deadlock family outcome.
    - label: hybrid_deadlock_targeting
      track: fruitful
      candidates:
        - round10_search_x6_transition_temp105
        - round10_conf_search_x4_transition_temp105
      hypothesis: the teacher-locked sentinel may need both a softer target and better transition-state coverage; neither intervention alone may be strong enough.
      failure: the hybrid still ties or adds new complete-seed failures, which would argue for a harder family ceiling.
    - label: recursive_contract_probe
      track: exploratory
      candidates:
        - round10_warm1_last_step
        - round10_warm2_last_step
        - round10_stoch25_last_two
        - round10_stoch50_last_two
        - round10_stoch75_last_two
        - settling_round10_last_step
        - settling_round10_last_two
        - round10_warm1_last_two
        - round10_warm2_last_two
        - round10_rounds12_last_step
      hypothesis: if the remaining barrier is partly a recursive training-contract problem, a narrower contract bracket should break it without opening a new benchmark family.
      failure: the candidates either re-enter the tie bucket or collapse below it with extra instability.
    - label: phase_memory_pilot
      track: archpilot
      candidates:
        - round10_phase_memory_mix025_search_x4
        - round10_phase_memory_mix050_search_x4
        - round10_phase_memory_mix050_temp105_search_x4
        - round10_phase_memory_mix050_conf_search_x4
      hypothesis: a small routed fast/slow state split may help the model retain phase context across the pre-key transition without abandoning the routed family.
      failure: the pilot cannot even rejoin the deadlock-dev tie bucket or it weakens route structure enough to make a follow-on branch unjustified.

