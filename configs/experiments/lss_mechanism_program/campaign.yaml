analysis:
  source_stage1_root: outputs/experiments/lss_next_round_campaign/stage2_screening
  source_stage1_exploit_json: outputs/reports/next_round_stage2_screening_exploit.json
  source_stage1_explore_json: outputs/reports/next_round_stage2_screening_explore.json
  differential_candidates:
    - round10
    - round10_conf_post4
    - round12_warm1_last_step
  phase_candidate: round10_conf_post4
  phase_trace_episodes: 16
  phase_max_steps: 256
  phase_cases:
    - lane: prospective_c
      seed: 193
      note: teacher_locked_prekey_deadlock
    - lane: prospective_f
      seed: 241
      note: routed_success_vs_control_failure
  restart_candidates:
    - round5
    - round7
    - round10
    - round11
    - round12
  shortlist_max_directions: 6

registration_groups:
  exploit:
    - label: frontier_prior_rechecks
      note: cheapest and strongest near-neighbor priors that already reach the parity bucket, re-screened after the mechanism analysis narrows the real question to convergence, breadth, and runbook ordering
      candidates:
        - round7
        - round10
        - round11
        - round12
    - label: postunlock_weighting_and_smoothing
      note: direct exploitation of the measured post-unlock sensitivity without adding a new architecture or extraction family
      candidates:
        - round10_post_unlock_x5
        - round12_post_unlock_x5
        - round10_post_unlock_x4_dis025
        - round12_post_unlock_x4_dis025
        - round10_post_unlock_x5_dis025
        - round10_temp095_post5
    - label: selection_tiebreak_lane
      note: explicit test of whether robust checkpoint selection can turn repeated raw ties into a reproducible benchmark edge
      candidates:
        - select_round10_final
        - select_round10_mix025
  explore:
    - label: confidence_weighted_followons
      note: mechanism-driven follow-on to the teacher-lock finding on the hard block, using bounded confidence shaping rather than more of the broad search
      candidates:
        - round7_conf_post4
        - round10_conf_post4
        - round12_conf_post4
        - round10_conf_temp095_post4
        - round12_conf_temp095_post4
    - label: warmup_and_settling_bracket
      note: narrower recursive-operator probes retained only because they hit parity once; the question now is whether one-step warm-up or settle-aware selection can keep the tie without the heavy convergence tax
      candidates:
        - round10_warm1_last_step
        - round12_warm1_last_step
        - round12_warm2_last_step
        - settling_round10_last_step
        - settling_round10_last_two
    - label: bridge_revisit
      note: small replay/bridge revisit retained only for the two non-catastrophic lines that re-entered the parity bucket
      candidates:
        - round10_carry3_post5
        - round10_door3_post5

candidate_subset:
  - round7
  - round10
  - round11
  - round12
  - round10_post_unlock_x5
  - round12_post_unlock_x5
  - round10_post_unlock_x4_dis025
  - round12_post_unlock_x4_dis025
  - round10_post_unlock_x5_dis025
  - round10_temp095_post5
  - select_round10_final
  - select_round10_mix025
  - round7_conf_post4
  - round10_conf_post4
  - round12_conf_post4
  - round10_conf_temp095_post4
  - round12_conf_temp095_post4
  - round10_warm1_last_step
  - round12_warm1_last_step
  - round12_warm2_last_step
  - settling_round10_last_step
  - settling_round10_last_two
  - round10_carry3_post5
  - round10_door3_post5
