name: lss_memory_next_program

current_canonical_name: round6
current_canonical_pack: outputs/reports/portfolio_candidate_pack.json
current_gate_reference_pack: outputs/reports/round6_current_benchmark_pack.json
frozen_pack: outputs/reports/frozen_benchmark_pack.json
current_decision_memo: outputs/reports/memory_conversion_decision_memo.md
nearby_followup_report: outputs/reports/next_arch_wave_nearby_followup.md

target_substantive_runs: 80

analysis:
  program_label: Large Memory Next Program
  max_steps: 405
  diagnostic_episodes: 64
  source_probe_episode_limit: 8
  source_probe_draws: 16
  dev_groups:
    - label: dev_a
      start_seed: 5000
      episodes: 32
    - label: dev_b
      start_seed: 6000
      episodes: 32
    - label: dev_c
      start_seed: 7000
      episodes: 32
  holdout_groups:
    - label: holdout_a
      start_seed: 8000
      episodes: 32
    - label: holdout_b
      start_seed: 9000
      episodes: 32
    - label: holdout_c
      start_seed: 10000
      episodes: 32
  healthy_groups:
    - label: healthy_upper_a
      start_seed: 11000
      episodes: 32
    - label: healthy_upper_b
      start_seed: 12000
      episodes: 32
  stability_groups:
    - label: stability_a
      start_seed: 13000
      episodes: 32
    - label: stability_b
      start_seed: 14000
      episodes: 32
  source_modes:
    greedy:
      label: greedy
      strategy: greedy
    lower_t005:
      label: lower_t005
      strategy: constant_temp
      temperature: 0.05
    gap_t055:
      label: gap_t055
      strategy: constant_temp
      temperature: 0.055
    shoulder_t008:
      label: shoulder_t008
      strategy: constant_temp
      temperature: 0.08
  temperature_bands:
    lower_boundary: [0.04, 0.045, 0.05]
    strongest_gap: [0.05, 0.0525, 0.055]
    shoulder: [0.06, 0.065, 0.07]
    upper_plateau: [0.075, 0.08, 0.09]
  current_best_local_point: partial_shift22
  route_validation_checkpoints:
    - partial_shift22
    - partial_shift22_adaptive_floor25
  stability_checkpoints:
    - partial_shift22
    - partial_shift225

