practicalization:
  students:
    - checkpoint: partial_shift22
      student_label: partial_shift22
    - checkpoint: partial_shift22_adaptive_floor25
      student_label: adaptive_floor25
    - checkpoint: partial_shift225_scale30
      student_label: scale30
    - checkpoint: gru_long_11
      student_label: gru_long_11
    - checkpoint: partial_shift22_adaptive_floor25_shiftcomp50
      student_label: shiftcomp50
  families:
    sampled_success:
      label: Sampled-Success Distillation
      student_keys: [partial_shift22, adaptive_floor25, scale30, gru_long_11]
      temperatures: [0.05, 0.055]
      targets: [policy_head]
      weightings: [return]
    selective_compute:
      label: Selective Compute-Structure Extraction
      student_keys: [partial_shift22, adaptive_floor25, scale30, gru_long_11]
      temperatures: [0.05, 0.055]
      targets: [policy_head_plus_last_shared]
      weightings: [return]
    temperature_aware_teacher:
      label: Temperature-Aware Teacher
      student_keys: [partial_shift22, adaptive_floor25, scale30, gru_long_11]
      temperatures: [0.045, 0.06]
      targets: [policy_head]
      weightings: [return]
    hybrid:
      label: Hybrid Practicalization
      student_keys: [partial_shift22, adaptive_floor25, scale30, gru_long_11]
      temperatures: [0.05, 0.055]
      targets: [policy_head_plus_last_shared]
      weightings: [uniform]
    architecture_pilot:
      label: Architecture-Adjacent Memory Pilot
      student_keys: [partial_shift22, adaptive_floor25, scale30, shiftcomp50]
      temperatures: [0.05, 0.055]
      targets: [policy_head]
      weightings: [uniform]
  success_target: 32
  max_episodes: 320
  batch_size: 128
  epochs: 6
  learning_rate: 0.0001
  eval_episodes: 32

