seed: 7
tags: ["experiment", "minigrid", "doorkey", "sare", "greedy_recovery", "entropy_sweep"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 5
  checkpoint_interval: 20
env:
  suite: minigrid
  env_id: MiniGrid-DoorKey-5x5-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 64
  total_updates: 80
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.0003
  ent_coef: 0.003
model:
  variant: sare
  hidden_size: 128
  token_dim: 128
  expert_count: 4
  top_k: 2
  expert_hidden_size: 256
  temperature: 1.0
logging:
  run_name: experiment_minigrid_doorkey_sare_ent3e3
  output_dir: outputs/experiments/greedy_recovery/entropy_sweep/minigrid_doorkey_sare_ent3e3
evaluation:
  episodes: 16
  greedy: true
