seed: 11
tags: ["minigrid", "memory", "token_gru", "margin_residual", "margin_decode_probe"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 5
  checkpoint_interval: 8
env:
  suite: minigrid
  env_id: MiniGrid-MemoryS9-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 96
  total_updates: 32
  update_epochs: 4
  minibatches: 4
  sequence_minibatches: true
  learning_rate: 0.0003
model:
  variant: token_gru
  hidden_size: 128
  token_dim: 128
  encoder_layers: 2
  num_heads: 4
  policy_margin_residual: true
  policy_margin_residual_scale: 1.0
  policy_margin_threshold: 0.25
  policy_margin_sharpness: 12.0
logging:
  run_name: memory_token_gru_long_margin_residual
  output_dir: outputs/experiments/memory_margin_decode_probe/memory_token_gru_long_margin_residual
evaluation:
  episodes: 16
  greedy: true
