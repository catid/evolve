seed: 7
tags: ["experiment", "minigrid", "dynamic_obstacles", "token_dense", "control"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 5
  checkpoint_interval: 20
env:
  suite: minigrid
  env_id: MiniGrid-Dynamic-Obstacles-5x5-v0
  num_envs: 8
  num_eval_envs: 8
  max_episode_steps: 128
ppo:
  rollout_steps: 64
  total_updates: 120
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.0003
  ent_coef: 0.01
model:
  variant: token_dense
  hidden_size: 128
  token_dim: 128
  encoder_layers: 2
  num_heads: 4
logging:
  run_name: experiment_minigrid_dynamic_obstacles_token_dense
  output_dir: outputs/experiments/baselines/minigrid_dynamic_obstacles_token_dense
evaluation:
  episodes: 16
  greedy: true
