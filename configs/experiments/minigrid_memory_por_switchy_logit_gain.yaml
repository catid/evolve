seed: 7
tags: ["minigrid", "memory", "por", "logit_gain", "decode_probe"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 8
  checkpoint_interval: 12
env:
  suite: minigrid
  env_id: MiniGrid-MemoryS9-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 96
  total_updates: 48
  update_epochs: 4
  minibatches: 4
  sequence_minibatches: true
  learning_rate: 0.0003
model:
  variant: por
  hidden_size: 128
  token_dim: 128
  encoder_layers: 2
  num_heads: 4
  option_count: 4
  termination_bias: 1.0
  policy_logit_gain: true
  policy_logit_gain_scale: 0.5
  policy_logit_gain_threshold: 0.25
  policy_logit_gain_sharpness: 12.0
logging:
  run_name: memory_por_switchy_logit_gain
  output_dir: outputs/experiments/memory_logit_gain_probe/memory_por_switchy_logit_gain
evaluation:
  episodes: 16
  greedy: true
