registration_groups:
  exploit:
    - label: frontier_prior_challengers
      note: closest measured near-neighbors around round count and mild smoothing, targeted at the repeated 0.9000 parity bucket
      candidates:
        - round7
        - round8
        - round9
        - round10
        - round11
        - round12
        - round7_temp_095
        - round10_temp_095
    - label: hard_block_parity_breakers
      note: post-unlock and mixed-weight variants aimed directly at the late-collapse blocker family
      candidates:
        - round7_post_unlock_x5
        - round10_post_unlock_x5
        - round12_post_unlock_x5
        - round10_post_unlock_x4_dis025
        - round12_post_unlock_x4_dis025
        - round10_post_unlock_x5_dis025
        - round12_post_unlock_x5_dis025
        - round10_temp095_post5
    - label: restart_policy_exploitation
      note: explicit re-check of the live restart schedule against the hold-only and legacy base-restart priors
      candidates:
        - round5
        - post_unlock_weighted
    - label: candidate_selection_exploit_lane
      note: selection rules that could turn repeated raw ties into a reproducible post-control edge without changing the underlying family
      candidates:
        - select_round7_final
        - select_round10_final
        - select_round7_temp095
        - select_round10_temp095
        - select_round7_post5
        - select_round10_mix025
  explore:
    - label: detached_warmup_terminal_supervision
      note: bounded warm-up and terminal-credit variants testing whether a more depth-agnostic operator helps
      candidates:
        - round7_warm1_last_step
        - round10_warm1_last_step
        - round12_warm1_last_step
        - round10_warm2_last_step
        - round12_warm2_last_step
    - label: stochastic_credit_horizon
      note: explicit last-step versus last-two-step mixtures to test recursive credit assignment bottlenecks
      candidates:
        - round7_stoch50_last_two
        - round10_stoch50_last_two
        - round12_stoch50_last_two
        - round10_stoch25_last_two
        - round10_stoch75_last_two
    - label: settling_diagnostics
      note: settling-aware selection proxies on the most plausible warm-up and stochastic lineages
      candidates:
        - settling_round7_last_step
        - settling_round10_last_step
        - settling_round10_last_two
        - settling_round10_stoch50
    - label: confidence_disagreement_shaping
      note: confidence-weighted KL with and without mild smoothing, targeted at the remaining parity cluster
      candidates:
        - round7_conf_post4
        - round10_conf_post4
        - round12_conf_post4
        - round10_conf_temp095_post4
        - round12_conf_temp095_post4
    - label: replay_cap_bridge_revisit
      note: fair-shot revisit of previously weak replay and bridge ideas under tighter candidate selection
      candidates:
        - round7_phase_balanced_4096
        - round10_phase_balanced_4096
        - round10_cap_balanced_4096
        - round10_carry3_post5
        - round10_door3_post5

seed_block_rationale:
  dev:
    prospective_c/prospective_d/prospective_e/prospective_f cover the known parity bucket, the late-collapse blocker, and one broader stress lane used for selection.
  holdout:
    prospective_g/prospective_h/prospective_i/prospective_j stay out of Stage 2 selection and test whether any candidate generalizes beyond the dev blocker surface.
  healthy:
    original/fresh/fresh_extra/fresh_final preserve the known healthy DoorKey behavior that `round6` must not break to look better.
  hard_block:
    prospective_c/193, prospective_f/233, prospective_h/269, and prospective_h/277 are the measured blocker quartet carried forward from the weakness dossier and triage stack.
  route_and_stability:
    dev, holdout, healthy, and hard-block seeds are all retained in route/stability so any surviving story has to stay routed and non-brittle across the full narrowed state.

unsupported_directions:
  - The current learner-state supervision and evaluation surface does not expose an independent test-time recursion-depth override, so the train-shallow/test-deep idea is approximated here with settling-aware and late-round proxy lanes rather than a fake unsupported knob.

