candidates:
  round10_warm2_last_step:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    track: exploratory
    family: rsm_detached_warmup_final_step
    direction: warmup_two_final_step_only
    description: two warm-up rounds before terminal-only KL on the round10 lineage
    overrides:
      loop:
        rounds: 10
        warmup_rounds: 2
      student:
        temporal_credit_mode: last_step
  round12_warm2_last_step:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    track: exploratory
    family: rsm_detached_warmup_final_step
    direction: warmup_two_final_step_only
    description: two warm-up rounds before terminal-only KL on the round12 lineage
    overrides:
      loop:
        rounds: 12
        warmup_rounds: 2
      student:
        temporal_credit_mode: last_step
  round10_stoch25_last_two:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    track: exploratory
    family: rsm_stochastic_credit_horizon
    direction: stochastic_last_step_last_two_mix_025
    description: stochastic credit horizon with a light penultimate-step keep probability on the round10 lineage
    overrides:
      loop:
        rounds: 10
      student:
        temporal_credit_mode: stochastic_last_two
        temporal_penultimate_keep_prob: 0.25
  round10_stoch75_last_two:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    track: exploratory
    family: rsm_stochastic_credit_horizon
    direction: stochastic_last_step_last_two_mix_075
    description: stochastic credit horizon with a heavy penultimate-step keep probability on the round10 lineage
    overrides:
      loop:
        rounds: 10
      student:
        temporal_credit_mode: stochastic_last_two
        temporal_penultimate_keep_prob: 0.75
  round10_conf_temp095_post4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    track: exploratory
    family: confidence_weighting
    direction: confidence_weighting_plus_smoothing
    description: mild teacher smoothing plus confidence-weighted KL on the round10 post-unlock lane
    overrides:
      loop:
        rounds: 10
      teacher:
        temperature: 0.95
      student:
        weighting: teacher_confidence
        phase_weights:
          post_unlock: 4.0
  round12_conf_temp095_post4:
    template: configs/experiments/lss_long_campaign/lss_kl_post_unlock_weighted.yaml
    track: exploratory
    family: confidence_weighting
    direction: confidence_weighting_plus_smoothing
    description: mild teacher smoothing plus confidence-weighted KL on the round12 post-unlock lane
    overrides:
      loop:
        rounds: 12
      teacher:
        temperature: 0.95
      student:
        weighting: teacher_confidence
        phase_weights:
          post_unlock: 4.0
