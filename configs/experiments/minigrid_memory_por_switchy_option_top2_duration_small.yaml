seed: 11
tags: ["minigrid", "memory", "por", "option_top2_duration", "architecture_probe"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 8
  checkpoint_interval: 12
env:
  suite: minigrid
  env_id: MiniGrid-MemoryS9-v0
  num_envs: 8
  num_eval_envs: 8
ppo:
  rollout_steps: 96
  total_updates: 48
  update_epochs: 4
  minibatches: 4
  sequence_minibatches: true
  learning_rate: 0.0003
model:
  variant: por
  hidden_size: 128
  token_dim: 128
  encoder_layers: 2
  num_heads: 4
  option_count: 4
  termination_bias: 1.0
  por_option_top2_rerank: true
  policy_option_top2_rerank: true
  policy_option_top2_rerank_scale: 0.25
  policy_option_top2_use_duration_gate: true
logging:
  run_name: memory_por_switchy_option_top2_duration_small
  output_dir: outputs/experiments/memory_option_top2_duration_probe/memory_por_switchy_option_top2_duration_small
evaluation:
  episodes: 16
  greedy: true
