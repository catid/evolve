seed: 7
tags: ["diagnostic", "minigrid", "doorkey", "token_dense", "depth4", "fully_observed"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 5
  checkpoint_interval: 20
env:
  suite: minigrid
  env_id: MiniGrid-DoorKey-5x5-v0
  num_envs: 8
  num_eval_envs: 8
  fully_observed: true
ppo:
  rollout_steps: 64
  total_updates: 80
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.0003
model:
  variant: token_dense
  hidden_size: 128
  token_dim: 128
  encoder_layers: 4
  num_heads: 4
logging:
  run_name: diagnostic_minigrid_doorkey_token_dense_depth4_fully_observed
  output_dir: outputs/diagnostics/tokenization_gap/minigrid_doorkey_token_dense_depth4_fully_observed
evaluation:
  episodes: 16
  greedy: true
