seed: 7
tags: ["diagnostic", "minigrid", "sanity", "empty5", "flat_dense"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 5
  checkpoint_interval: 20
env:
  suite: minigrid
  env_id: MiniGrid-Empty-5x5-v0
  num_envs: 8
  num_eval_envs: 8
  max_episode_steps: 64
ppo:
  rollout_steps: 64
  total_updates: 40
  update_epochs: 4
  minibatches: 4
  learning_rate: 0.0003
  ent_coef: 0.005
model:
  variant: flat_dense
  hidden_size: 128
logging:
  run_name: diagnostic_minigrid_empty5_flat_dense_sanity
  output_dir: outputs/diagnostics/minigrid_sanity/minigrid_empty5_flat_dense
evaluation:
  episodes: 16
  greedy: true
