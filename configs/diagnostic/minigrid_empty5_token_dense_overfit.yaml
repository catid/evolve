seed: 7
tags: ["diagnostic", "minigrid", "tiny_overfit", "empty5", "token_dense"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 10
  checkpoint_interval: 25
env:
  suite: minigrid
  env_id: MiniGrid-Empty-5x5-v0
  num_envs: 1
  num_eval_envs: 1
  max_episode_steps: 32
  fully_observed: true
ppo:
  rollout_steps: 32
  total_updates: 400
  update_epochs: 8
  minibatches: 1
  learning_rate: 0.0001
  anneal_lr: false
  clip_coef: 0.1
  value_clip_coef: 0.1
  ent_coef: 0.0
model:
  variant: token_dense
  hidden_size: 128
  token_dim: 128
  encoder_layers: 2
  num_heads: 4
logging:
  run_name: diagnostic_minigrid_empty5_token_dense_overfit
  output_dir: outputs/diagnostics/tiny_overfit/minigrid_empty5_token_dense_overfit
evaluation:
  episodes: 8
  greedy: true
