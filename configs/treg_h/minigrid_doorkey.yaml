seed: 7
tags: ["treg_h", "minigrid"]
system:
  device: auto
  precision: auto
  deterministic: true
  log_interval: 1
  checkpoint_interval: 2
env:
  suite: minigrid
  env_id: MiniGrid-DoorKey-5x5-v0
  num_envs: 4
  num_eval_envs: 4
ppo:
  rollout_steps: 32
  total_updates: 4
  update_epochs: 2
  minibatches: 2
  learning_rate: 0.00025
model:
  variant: treg_h
  hidden_size: 128
  token_dim: 128
  expert_count: 4
  expert_hidden_size: 256
  temperature: 1.0
  ponder_cost: 0.01
logging:
  run_name: minigrid_treg_h
  output_dir: outputs/minigrid_treg_h
evaluation:
  episodes: 8
  greedy: true
