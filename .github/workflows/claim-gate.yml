name: claim-gate

on:
  pull_request:
    paths:
      - ".github/**"
      - "README.md"
      - "report.md"
      - "summary.md"
      - "configs/claims/**"
      - "outputs/reports/**"
      - "scripts/run_claim_gate.sh"
      - "scripts/run_claim_gate_conformance.sh"
      - "scripts/run_claim_history_replay.sh"
      - "scripts/run_claim_gate_redteam_finalize.sh"
      - "scripts/run_frozen_baseline_validation.sh"
      - "scripts/run_frozen_benchmark_pack_validation.sh"
      - "scripts/run_freeze_hardening_finalize.sh"
      - "src/psmn_rl/analysis/benchmark_pack.py"
      - "src/psmn_rl/analysis/claim_gate.py"
      - "src/psmn_rl/analysis/claim_gate_conformance.py"
      - "src/psmn_rl/analysis/claim_history_replay.py"
      - "src/psmn_rl/analysis/freeze_hardening.py"
      - "tests/data/claim_gate_corpus/**"
      - "tests/data/claim_history_replay/**"
      - "tests/test_benchmark_pack.py"
      - "tests/test_claim_gate.py"
      - "tests/test_claim_gate_conformance.py"
      - "tests/test_claim_history_replay.py"
      - "tests/test_freeze_hardening.py"
  workflow_dispatch:

jobs:
  frozen-claim-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install --pre torch --index-url https://download.pytorch.org/whl/nightly/cpu
          uv pip install -e '.[dev]'

      - name: Syntax check scripts
        run: |
          bash -n scripts/run_frozen_baseline_validation.sh
          bash -n scripts/run_frozen_benchmark_pack_validation.sh
          bash -n scripts/run_claim_gate.sh
          bash -n scripts/run_claim_gate_conformance.sh
          bash -n scripts/run_claim_history_replay.sh
          bash -n scripts/run_claim_gate_redteam_finalize.sh
          bash -n scripts/run_freeze_hardening_finalize.sh

      - name: Validate frozen pack and claim gate
        run: |
          source .venv/bin/activate
          ./scripts/run_freeze_hardening_finalize.sh

      - name: Run adversarial claim-gate conformance
        run: |
          source .venv/bin/activate
          bash ./scripts/run_claim_gate_conformance.sh

      - name: Run historical claim-gate replay
        run: |
          source .venv/bin/activate
          bash ./scripts/run_claim_history_replay.sh

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest -q
