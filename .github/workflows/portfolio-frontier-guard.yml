name: portfolio-frontier-guard

on:
  pull_request:
    paths:
      - ".github/**"
      - "README.md"
      - "summary.md"
      - "report.md"
      - "scripts/run_portfolio_frontier_guard.sh"
      - "src/psmn_rl/analysis/portfolio_frontier_*.py"
      - "src/psmn_rl/analysis/portfolio_candidate_pack_loader.py"
      - "src/psmn_rl/analysis/portfolio_active_state_doctor.py"
      - "src/psmn_rl/analysis/portfolio_active_state_doctor_loader.py"
      - "src/psmn_rl/analysis/portfolio_operational_state.py"
      - "src/psmn_rl/analysis/portfolio_operational_state_loader.py"
      - "src/psmn_rl/analysis/portfolio_gate_report_loader.py"
      - "src/psmn_rl/analysis/portfolio_seed_pack_doctor.py"
      - "src/psmn_rl/analysis/portfolio_seed_pack_doctor_loader.py"
      - "src/psmn_rl/analysis/portfolio_seed_pack_loader.py"
      - "src/psmn_rl/analysis/portfolio_seed_pack_scorer_loader.py"
      - "src/psmn_rl/analysis/portfolio_seed_pack_validation_loader.py"
      - "src/psmn_rl/analysis/lss_portfolio_frontier_*.py"
      - "tests/test_portfolio_frontier_*.py"
      - "tests/test_portfolio_candidate_pack_loader.py"
      - "tests/test_portfolio_active_state_doctor.py"
      - "tests/test_portfolio_active_state_doctor_loader.py"
      - "tests/test_portfolio_operational_state.py"
      - "tests/test_portfolio_operational_state_loader.py"
      - "tests/test_portfolio_gate_report_loader.py"
      - "tests/test_portfolio_seed_pack_doctor.py"
      - "tests/test_portfolio_seed_pack_doctor_loader.py"
      - "tests/test_portfolio_seed_pack_loader.py"
      - "tests/test_portfolio_seed_pack_scorer_loader.py"
      - "tests/test_portfolio_seed_pack_validation_loader.py"
      - "outputs/reports/claim_ledger.md"
      - "outputs/reports/portfolio_candidate_pack.json"
      - "outputs/reports/portfolio_active_state_doctor*"
      - "outputs/reports/portfolio_operational_state*"
      - "outputs/reports/portfolio_seed_pack*"
      - "outputs/reports/portfolio_seed_pack.json"
      - "outputs/reports/portfolio_gate_report.md"
      - "outputs/reports/portfolio_decision_memo.md"
      - "outputs/reports/portfolio_frontier_*"
  workflow_dispatch:

jobs:
  portfolio-frontier-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install --pre torch --index-url https://download.pytorch.org/whl/nightly/cpu
          uv pip install -e '.[dev]'

      - name: Syntax check guard script
        run: |
          bash -n scripts/run_portfolio_frontier_guard.sh

      - name: Run frontier guard
        run: |
          source .venv/bin/activate
          bash ./scripts/run_portfolio_frontier_guard.sh

      - name: Upload frontier guard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-frontier-guard-reports
          if-no-files-found: error
          path: |
            outputs/reports/portfolio_frontier_docs_audit.md
            outputs/reports/portfolio_frontier_docs_audit.json
            outputs/reports/portfolio_frontier_doctor.md
            outputs/reports/portfolio_frontier_doctor.json
            outputs/reports/portfolio_frontier_guard_report.md
            outputs/reports/portfolio_frontier_guard_report.json
            outputs/reports/portfolio_frontier_guard_workflow_contract.md
            outputs/reports/portfolio_frontier_guard_workflow_contract.json
            outputs/reports/portfolio_active_state_doctor.md
            outputs/reports/portfolio_active_state_doctor.json
            outputs/reports/portfolio_operational_state.md
            outputs/reports/portfolio_operational_state.json
            outputs/reports/portfolio_seed_pack_doctor.md
            outputs/reports/portfolio_seed_pack_doctor.json
